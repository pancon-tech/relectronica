<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="stylesheet" href="estilo.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relectrónica - Registro de Recepción</title>
    
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="logo.png" alt="Relectrónica Logo">
        </div>
        <div class="header-info">
            <h1>Relectrónica</h1>
            <p>Recepción & Fichas Técnicas</p>
        </div>
    </header>

    <div class="main-content">
        <div class="formulario-taller">
            
            <div class="grupo-campo">
                <label>Número de Servicio / Ticket:</label>
                <div class="input-wrapper">
                    <input type="text" id="input-ticket" placeholder="Ej: 0241, 1050 (O déjalo vacío para auto-generar)">
                </div>
            </div>

            <div class="grupo-campo">
                <label>Fabricante (Marca):</label>
                <div class="input-wrapper">
                    <input type="text" id="input-fabricante" placeholder="Ej: Samsung, LG, Sony...">
                    <button class="btn-input-mic" onclick="escucharCampo('input-fabricante')">🎙️</button>
                </div>
            </div>

            <div class="grupo-campo">
                <label>Modelo del Dispositivo:</label>
                <div class="input-wrapper">
                    <input type="text" id="input-modelo" placeholder="Ej: UN55TU7000GXZS...">
                    <button class="btn-input-mic" onclick="escucharCampo('input-modelo')">🎙️</button>
                </div>
            </div>

            <div class="grupo-campo">
                <label>Número de Serie (S/N):</label>
                <div class="input-wrapper">
                    <input type="text" id="input-serial" placeholder="Ej: L93N3X0HA00231...">
                    <button class="btn-input-mic" onclick="escucharCampo('input-serial')">🎙️</button>
                </div>
            </div>

            <div class="grupo-campo">
                <label>Diagnóstico Inicial / Síntoma de la Falla:</label>
                <div class="input-wrapper">
                    <textarea id="input-falla" rows="2" placeholder="Ej: Falla de backlighting, reinicios continuos, no sintoniza..."></textarea>
                    <button class="btn-input-mic" onclick="escucharCampo('input-falla')">🎙️</button>
                </div>
            </div>

            <div class="grupo-campo">
                <label>Estatus del Servicio:</label>
                <div class="input-wrapper">
                    <select id="input-estatus">
                        <option value="En Diagnóstico">En Diagnóstico</option>
                        <option value="Esperando Repuesto">Esperando Repuesto</option>
                        <option value="Reparado">Reparado</option>
                        <option value="Sin Solución">Sin Solución</option>
                    </select>
                </div>
            </div>

            <button class="btn-principal" onclick="procesarNuevaOrden()">Generar Ficha de Recepción</button>
        </div>

        <div class="resultado-container" id="resultado-container">
            <div class="ficha-orden" id="ficha-render"></div>
            <button class="btn-principal" id="btn-copiar" style="background-color: #2563eb; margin-top: 12px;">📋 Copiar Reporte para WhatsApp</button>
        </div>

        <div class="seccion-historial">
            <div class="header-historial-acciones">
                <h2 class="titulo-historial">Órdenes Guardadas</h2>
                <button class="btn-borrar-todo" onclick="limpiarTodoElHistorial()">🗑️ Vaciar Historial</button>
            </div>
            
            <input type="text" id="buscador" class="buscador-historial" placeholder="🔍 Buscar por Marca, Modelo o N° de Orden..." oninput="filtrarHistorial()">
            
            <div class="lista-ordenes" id="lista-ordenes-container"></div>
        </div>
    </div>

    <nav class="nav-tabs">
        <a href="index.html" class="nav-item">
            <span class="nav-icon">💬</span>
            <span>Chat Técnico</span>
        </a>
        <a href="notas.html" class="nav-item">
            <span class="nav-icon">📝</span>
            <span>Mis Notas</span>
        </a>
        <a href="biblioteca.html" class="nav-item">
            <span class="nav-icon">📘</span>
            <span>Biblioteca</span>
        </a>
        <a href="hardware.html" class="nav-item">
            <span class="nav-icon">🖼️</span>
            <span>Hardware</span>
        </a>
        <a href="fallas.html" class="nav-item">
            <span class="nav-icon">🛠️</span>
            <span>Casos de Falla</span>
        </a>
        <a href="recepcion.html" class="nav-item active">
            <span class="nav-icon">📋</span>
            <span>Recepción</span>
        </a>
                </nav>
        <script>
        let reconocimientoVoz = null;
        let campoActivoId = null;
        let estaEscuchando = false;

        window.addEventListener('DOMContentLoaded', () => {
            inicializarReconocimientoVoz();
            renderizarHistorial();
        });

        // RECONOCIMIENTO DE VOZ INDIVIDUAL POR CAMPO
        function inicializarReconocimientoVoz() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                console.log("El navegador no soporta SpeechRecognition.");
                return;
            }

            reconocimientoVoz = new SpeechRecognition();
            reconocimientoVoz.lang = 'es-VE';
            reconocimientoVoz.continuous = false;
            reconocimientoVoz.interimResults = false;

            reconocimientoVoz.onstart = () => {
                estaEscuchando = true;
                if(campoActivoId) {
                    const boton = document.querySelector(`#${campoActivoId} ~ .btn-input-mic`);
                    if(boton) {
                        boton.classList.add('mic-activo');
                        boton.innerHTML = "🛑";
                    }
                }
            };

            reconocimientoVoz.onerror = () => forzarApagadoMic();
            reconocimientoVoz.onend = () => forzarApagadoMic();

            reconocimientoVoz.onresult = function(event) {
                const textoEscuchado = event.results[0][0].transcript;
                if (textoEscuchado.trim() !== "" && campoActivoId) {
                    const el = document.getElementById(campoActivoId);
                    if(el) {
                        el.value = el.value ? el.value + " " + textoEscuchado : textoEscuchado;
                    }
                }
            };
        }

        function escucharCampo(idCampo) {
            if (!reconocimientoVoz) {
                alert("Tu dispositivo no soporta reconocimiento de voz.");
                return;
            }
            if (estaEscuchando) {
                reconocimientoVoz.stop();
                if (campoActivoId === idCampo) return;
            }
            campoActivoId = idCampo;
            reconocimientoVoz.start();
        }

        function forzarApagadoMic() {
            estaEscuchando = false;
            document.querySelectorAll('.btn-input-mic').forEach(boton => {
                boton.classList.remove('mic-activo');
                boton.innerHTML = "🎙️";
            });
            campoActivoId = null;
        }

        // PROCESAR FORMULARIO Y GENERAR REPORTES
        function procesarNuevaOrden() {
            const ticketManual = document.getElementById('input-ticket').value.trim();
            const fabricante = document.getElementById('input-fabricante').value.trim();
            const modelo = document.getElementById('input-modelo').value.trim();
            const serial = document.getElementById('input-serial').value.trim();
            const falla = document.getElementById('input-falla').value.trim();
            const estatus = document.getElementById('input-estatus').value;

            if (!fabricante || !modelo) {
                alert("Por favor, ingresa al menos la Marca y el Modelo del equipo.");
                return;
            }

            const fechaVal = new Date().toLocaleDateString('es-VE', { day: '2-digit', month: '2-digit', year: 'numeric' });
            // Usa el número ingresado o genera un prefijo automático aleatorio si se dejó vacío
            const prefijoOrden = ticketManual ? ticketManual : 'RE-' + Math.floor(1000 + Math.random() * 9000);

            const txtWhatsApp = `📋 RELECTRÓNICA - ORDEN DE SERVICIO\n` +
                                `---------------------------------\n` +
                                `Orden/Servicio N°: ${prefijoOrden}\n` +
                                `Fecha: ${fechaVal}\n` +
                                `Fabricante: ${fabricante}\n` +
                                `Modelo: ${modelo}\n` +
                                `S/N: ${serial || 'No especificado'}\n` +
                                `Falla: ${falla || 'Por revisar en banco'}\n` +
                                `Estatus: ${estatus}\n` +
                                `---------------------------------`;

            const contenedorFicha = document.getElementById('ficha-render');
            contenedorFicha.innerHTML = `
                <div class="ficha-titulo">RECEPCIÓN DE EQUIPO</div>
                <div class="ficha-header">
                    <span>N° SERVICIO: <strong>#${prefijoOrden}</strong></span>
                    <span>FECHA: ${fechaVal}</span>
                </div>
                <div class="ficha-campo"><strong>Fabricante:</strong> ${fabricante}</div>
                <div class="ficha-campo"><strong>Modelo:</strong> ${modelo}</div>
                <div class="ficha-campo"><strong>S/N:</strong> ${serial || 'N/A'}</div>
                <div class="ficha-campo"><strong>Falla:</strong> ${falla || 'Por revisar'}</div>
                <div class="ficha-campo"><strong>Estatus:</strong> <span class="badge-estatus-dinamico ${obtenerClaseBadge(estatus)}">${estatus}</span></div>
            `;

            document.getElementById('resultado-container').style.display = 'block';

            const btnCopiar = document.getElementById('btn-copiar');
            const nuevoBtnCopiar = btnCopiar.cloneNode(true);
            btnCopiar.parentNode.replaceChild(nuevoBtnCopiar, btnCopiar);

            nuevoBtnCopiar.addEventListener('click', () => {
                navigator.clipboard.writeText(txtWhatsApp).then(() => {
                    guardarEnHistorial({ prefijoOrden, fechaVal, fabricante, modelo, serial, falla, estatus, txtWhatsApp });
                    alert("¡Ficha copiada al portapapeles y guardada en el historial!");
                    
                    // Limpieza automática para el siguiente registro
                    document.getElementById('input-ticket').value = '';
                    document.getElementById('input-fabricante').value = '';
                    document.getElementById('input-modelo').value = '';
                    document.getElementById('input-serial').value = '';
                    document.getElementById('input-falla').value = '';
                    document.getElementById('resultado-container').style.display = 'none';
                });
            });
            
            nuevoBtnCopiar.scrollIntoView({ behavior: 'smooth' });
        }

        // CONTROL CLASES SEMÁFORO
        function obtenerClaseTarjeta(estatus) {
            if (estatus === "En Diagnóstico") return "status-diagnostico";
            if (estatus === "Esperando Repuesto") return "status-repuesto";
            if (estatus === "Reparado") return "status-reparado";
            if (estatus === "Sin Solución") return "status-sin-solucion";
            return "";
        }

        function obtenerClaseBadge(estatus) {
            if (estatus === "En Diagnóstico") return "bg-diag";
            if (estatus === "Esperando Repuesto") return "bg-rep";
            if (estatus === "Reparado") return "bg-repado";
            if (estatus === "Sin Solución") return "bg-sinsol";
            return "";
        }

        // MOTOR DE HISTORIAL LOCAL STORAGE
        function guardarEnHistorial(orden) {
            let historial = localStorage.getItem('relectronica_ordenes_historial');
            historial = historial ? JSON.parse(historial) : [];
            historial.unshift(orden);
            localStorage.setItem('relectronica_ordenes_historial', JSON.stringify(historial));
            renderizarHistorial();
        }

        function renderizarHistorial() {
            let historial = localStorage.getItem('relectronica_ordenes_historial');
            const container = document.getElementById('lista-ordenes-container');
            container.innerHTML = '';

            if (!historial || JSON.parse(historial).length === 0) {
                container.innerHTML = `<p style="font-size: 0.85rem; color: #a0aec0; text-align: center; padding: 10px;">No hay órdenes registradas.</p>`;
                return;
            }

            const listaOrdenes = JSON.parse(historial);

            listaOrdenes.forEach((orden, index) => {
                const item = document.createElement('div');
                item.classList.add('item-orden-guardada', obtenerClaseTarjeta(orden.estatus));
                item.innerHTML = `
                    <div class="item-orden-header">
                        <span>N° Servicio: <strong>#${orden.prefijoOrden}</strong></span>
                        <span>${orden.fechaVal}</span>
                    </div>
                    <div class="item-orden-detalles">
                        <strong>${orden.fabricante} ${orden.modelo}</strong><br>
                        <span style="font-size: 0.8rem; opacity: 0.85;">S/N: ${orden.serial || 'N/A'}</span><br>
                        <span style="font-size: 0.8rem; opacity: 0.85;">Falla: ${orden.falla || 'Por revisar'}</span><br>
                        <span style="margin-top: 4px; display: inline-block;" class="badge-estatus-dinamico ${obtenerClaseBadge(orden.estatus)}">${orden.estatus}</span>
                    </div>
                    <div class="bloque-botones-item">
                        <button class="btn-recopiar" onclick="copiarHistorialDirecto(${index})">📋 Copiar</button>
                        <select class="select-cambiar-status" onchange="actualizarEstatusOrden(${index}, this.value)">
                            <option value="" disabled selected>⚡ Estado</option>
                            <option value="En Diagnóstico">En Diagnóstico</option>
                            <option value="Esperando Repuesto">Esperando Repuesto</option>
                            <option value="Reparado">Reparado</option>
                            <option value="Sin Solución">Sin Solución</option>
                        </select>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        // REGENERAR Y COPIAR TEXTO WHATSAPP DESDE EL HISTORIAL
        function actualizarTextoWhatsApp(orden) {
            return `📋 RELECTRÓNICA - ORDEN DE SERVICIO\n` +
                   `---------------------------------\n` +
                   `Orden/Servicio N°: ${orden.prefijoOrden}\n` +
                   `Fecha: ${orden.fechaVal}\n` +
                   `Fabricante: ${orden.fabricante}\n` +
                   `Modelo: ${orden.modelo}\n` +
                   `S/N: ${orden.serial || 'No especificado'}\n` +
                   `Falla: ${orden.falla || 'Por revisar en banco'}\n` +
                   `Estatus: ${orden.estatus}\n` +
                   `---------------------------------`;
        }

        function copiarHistorialDirecto(index) {
            let historial = localStorage.getItem('relectronica_ordenes_historial');
            if (historial) {
                const listaOrdenes = JSON.parse(historial);
                const orden = listaOrdenes[index];
                if (orden) {
                    navigator.clipboard.writeText(orden.txtWhatsApp).then(() => {
                        alert(`¡Reporte de Servicio #${orden.prefijoOrden} copiado!`);
                    });
                }
            }
        }

        // RE-ESTABLECER ESTATUS DIRECTAMENTE DESDE LA TARJETA
        function actualizarEstatusOrden(index, nuevoEstatus) {
            let historial = localStorage.getItem('relectronica_ordenes_historial');
            if (historial) {
                let listaOrdenes = JSON.parse(historial);
                if (listaOrdenes[index]) {
                    listaOrdenes[index].estatus = nuevoEstatus;
                    listaOrdenes[index].txtWhatsApp = actualizarTextoWhatsApp(listaOrdenes[index]);
                    localStorage.setItem('relectronica_ordenes_historial', JSON.stringify(listaOrdenes));
                    renderizarHistorial();
                    alert(`El estatus de la orden #${listaOrdenes[index].prefijoOrden} cambió a: ${nuevoEstatus}`);
                }
            }
        }

        // FILTRO DINÁMICO (BUSCADOR EN TIEMPO REAL)
        function filtrarHistorial() {
            const termino = document.getElementById('buscador').value.toLowerCase().trim();
            const tarjetas = document.querySelectorAll('.item-orden-guardada');

            tarjetas.forEach(tarjeta => {
                const textoTarjeta = tarjeta.innerText.toLowerCase();
                if (textoTarjeta.includes(termino)) {
                    tarjeta.style.display = 'flex';
                } else {
                    tarjeta.style.display = 'none';
                }
            });
        }

        // LIMPIEZA DE MEMORIA
        function limpiarTodoElHistorial() {
            if (confirm("¿Estás seguro de que quieres vaciar todo el registro de órdenes? Esta acción no se puede deshacer.")) {
                localStorage.removeItem('relectronica_ordenes_historial');
                renderizarHistorial();
            }
        }
    </script>
</body>
</html>
