<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relectrónica - Mis Notas de Taller</title>
    <style>
        :root {
            --bg-color: #0b131f;
            --chat-bg: #111c2c;
            --text-color: #ffffff;
            --primary-color: #7928ca;
            --border-color: #22344d;
            --card-bg: #162235;
            --input-bg: #080d16;
            --success-color: #10b981;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; min-height: 100vh; }
        header { background-color: var(--chat-bg); padding: 15px; display: flex; align-items: center; border-bottom: 1px solid var(--border-color); gap: 15px; }
        .logo-container { width: 50px; height: 50px; background: var(--primary-color); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        /* Añadimos estilo para los botones de backup */
        .backup-container { display: flex; gap: 10px; padding: 15px; background: #111c2c; }
        .btn-backup { padding: 10px; border: none; border-radius: 5px; color: white; cursor: pointer; flex: 1; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">R</div>
        <h1>Mis Notas de Taller</h1>
    </header>

    <div class="backup-container">
        <button onclick="exportarNotas()" class="btn-backup" style="background:#10b981;">💾 Exportar</button>
        <button onclick="document.getElementById('importFile').click()" class="btn-backup" style="background:#64748b;">📂 Importar</button>
        <input type="file" id="importFile" style="display:none" onchange="importarNotas(event)">
    </div>

    <div id="notes-list-container">
        </div>

    <script>
        // --- TU LÓGICA ORIGINAL ---
        function mostrarNotas() {
            const contenedor = document.getElementById('notes-list-container');
            const notas = JSON.parse(localStorage.getItem('relectronica_notas')) || [];
            contenedor.innerHTML = ""; 
            notas.forEach(nota => {
                const div = document.createElement('div');
                div.className = 'tech-card';
                div.innerHTML = `<h3>${nota.titulo || 'Sin título'}</h3><p>${nota.contenido || ''}</p><button onclick="eliminarNota(${nota.id})">Eliminar</button>`;
                contenedor.appendChild(div);
            });
        }

        function eliminarNota(id) {
            if (confirm("¿Estás seguro de que quieres borrar esta solución de tu bitácora?")) {
                let notas = JSON.parse(localStorage.getItem('relectronica_notas')) || [];
                notas = notas.filter(nota => nota.id !== id);
                localStorage.setItem('relectronica_notas', JSON.stringify(notas));
                mostrarNotas();
            }
        }

        // --- LÓGICA DE BACKUP ---
        function exportarNotas() {
            const notas = localStorage.getItem('relectronica_notas');
            if (!notas) { alert("No hay notas para exportar."); return; }
            const blob = new Blob([notas], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'backup_relectronica_notas.json';
            a.click();
        }

        function importarNotas(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    localStorage.setItem('relectronica_notas', e.target.result);
                    mostrarNotas();
                    alert("¡Backup importado con éxito!");
                } catch (err) { alert("Error al importar."); }
            };
            reader.readAsText(file);
        }

        mostrarNotas();
    </script>
</body>
</html>
