<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relectrónica - Mis Notas de Taller</title>
    <style>
        :root {
            --bg-color: #0b131f;
            --chat-bg: #111c2c;
            --text-color: #ffffff;
            --primary-color: #7928ca;
            --border-color: #22344d;
            --card-bg: #162235;
            --input-bg: #080d16;
            --success-color: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--chat-bg);
            padding: 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            gap: 15px;
        }

        .logo-container {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            overflow: hidden;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-color);
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .header-info h1 {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .main-content {
            flex: 1;
            padding: 20px;
            margin-bottom: 75px;
        }

        .section-title {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: #a855f7;
            font-weight: 600;
        }

        .form-container {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 14px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 12px;
        }

        label {
            font-size: 0.8rem;
            color: #cbd5e1;
        }

        input, textarea {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: white;
            padding: 10px;
            border-radius: 6px;
            outline: none;
            font-size: 0.9rem;
        }

        textarea {
            resize: none;
            height: 70px;
        }

        input:focus, textarea:focus {
            border-color: var(--primary-color);
        }

        .btn-save {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 0.9rem;
        }

        .search-box {
            margin-bottom: 15px;
            position: relative;
        }

        .search-box input {
            padding-left: 35px;
            border-color: #a855f7;
        }

        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 10px;
            top: 9px;
            font-size: 0.9rem;
        }

        .notes-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .note-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-left: 4px solid #a855f7;
            padding: 12px;
            border-radius: 0 10px 10px 0;
            position: relative;
        }

        .note-card h3 {
            font-size: 0.95rem;
            color: #fff;
            margin-bottom: 6px;
            padding-right: 25px;
        }

        .note-text {
            font-size: 0.85rem;
            color: #cbd5e1;
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .note-text b {
            color: #f59e0b;
        }

        .note-text.solucion b {
            color: var(--success-color);
        }

        .btn-delete {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            color: #ef4444;
            font-size: 1rem;
            cursor: pointer;
        }

        nav.nav-tabs {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background-color: var(--chat-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #a0aec0;
            text-decoration: none;
            font-size: 0.75rem;
            flex: 1;
            height: 100%;
            justify-content: center;
            gap: 4px;
        }

        .nav-item.active {
            color: #a855f7;
            font-weight: bold;
        }

        .nav-icon {
            font-size: 1.3rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="logo.png" alt="Relectrónica Logo">
        </div>
        <div class="header-info">
            <h1>Relectrónica</h1>
        </div>
    </header>

    <div class="main-content">
        <h2 class="section-title">Anotar Nueva Solución</h2>
        
        <div class="form-container">
            <div class="input-group">
                <label>Modelo del Equipo / N° de Tarjeta:</label>
                <input type="text" id="note-model" placeholder="Ej: Samsung UN40FH5003 / T-CON T315HW04">
            </div>
            <div class="input-group">
                <label>Falla o Síntoma observado:</label>
                <textarea id="note-fault" placeholder="Ej: Pantalla azulada sin video, o parpadea 5 veces"></textarea>
            </div>
            <div class="input-group">
                <label>Solución aplicada (El secreto técnico):</label>
                <textarea id="note-solution" placeholder="Ej: Se cambiaron filtros de 10uF cerca del integrado analógico"></textarea>
            </div>
            <button class="btn-save" onclick="guardarNota()">Guardar en Bitácora</button>
        </div>

        <h2 class="section-title">Buscar Soluciones Guardadas</h2>
        <div class="search-box">
            <input type="text" id="search-input" oninput="filtrarNotas()" placeholder="Escribe marca, modelo o falla...">
        </div>

        <div class="notes-list" id="notes-list-container">
            </div>
    </div>

        <nav class="nav-tabs">
        <a href="index.html" class="nav-item">
            <span class="nav-icon">💬</span>
            <span>Chat Técnico</span>
        </a>
        <a href="notas.html" class="nav-item">
            <span class="nav-icon">📝</span>
            <span>Mis Notas</span>
        </a>
        <a href="biblioteca.html" class="nav-item">
            <span class="nav-icon">📘</span>
            <span>Biblioteca</span>
        </a>
        <a href="hardware.html" class="nav-item">
            <span class="nav-icon">🖼️</span>
            <span>Hardware</span>
        </a>
        <a href="fallas.html" class="nav-item">
            <span class="nav-icon">🛠️</span>
            <span>Casos de Falla</span>
        </a>
        <a href="recepcion.html" class="nav-item">
            <span class="nav-icon">📋</span>
            <span>Recepción</span>
        </a>
    </nav>

        <script>
        // Cargar las notas guardadas apenas se abra la pantalla
        document.addEventListener('DOMContentLoaded', () => {
            mostrarNotas();
        });

        // Función para guardar una nueva solución en el almacenamiento local
        function guardarNota() {
            const modelo = document.getElementById('note-model').value.trim();
            const falla = document.getElementById('note-fault').value.trim();
            const solucion = document.getElementById('note-solution').value.trim();

            if (modelo === "" || falla === "" || solucion === "") {
                alert("Por favor, rellena todos los campos antes de guardar.");
                return;
            }

            // Crear el objeto de la nueva nota
            const nuevaNota = {
                id: Date.now(), // ID único basado en el tiempo
                modelo: modelo,
                falla: falla,
                solucion: solucion
            };

            // Obtener notas existentes o crear un arreglo vacío si es la primera
            let notas = JSON.parse(localStorage.getItem('relectronica_notas')) || [];
            
            // Agregar la nueva nota al inicio de la lista
            notas.unshift(nuevaNota);

            // Guardar de vuelta en el localStorage
            localStorage.setItem('relectronica_notas', JSON.stringify(notas));

            // Limpiar los campos del formulario para la próxima anotación
            document.getElementById('note-model').value = "";
            document.getElementById('note-fault').value = "";
            document.getElementById('note-solution').value = "";

            // Actualizar la lista en pantalla
            mostrarNotas();
        }

        // Función para renderizar todas las notas en la interfaz
        function mostrarNotas() {
            const contenedor = document.getElementById('notes-list-container');
            const notas = JSON.parse(localStorage.getItem('relectronica_notas')) || [];

            if (notas.length === 0) {
                contenedor.innerHTML = `<p style="color: #94a3b8; font-size: 0.85rem; text-align: center; padding: 20px;">Tu bitácora está vacía. ¡Anota tu primer "cangrejo" resuelto arriba!</p>`;
                return;
            }

            let html = "";
            notas.forEach(nota => {
                html += `
                    <div class="note-card" data-id="${nota.id}">
                        <button class="btn-delete" onclick="eliminarNota(${nota.id})">×</button>
                        <h3>📺 ${nota.modelo}</h3>
                        <p class="note-text"><b>⚠️ Falla:</b> ${nota.falla}</p>
                        <p class="note-text solucion"><b>✅ Solución:</b> ${nota.solucion}</p>
                    </div>
                `;
            });

            contenedor.innerHTML = html;
        }

        // Función para filtrar notas en tiempo real según lo que escribas
        function filtrarNotas() {
            const busqueda = document.getElementById('search-input').value.toLowerCase();
            const tarjetas = document.querySelectorAll('.note-card');
            let resultadosEncontrados = false;

            tarjetas.forEach(tarjeta => {
                const textoTarjeta = tarjeta.innerText.toLowerCase();
                if (textoTarjeta.includes(busqueda)) {
                    tarjeta.style.display = "block";
                    resultadosEncontrados = true;
                } else {
                    tarjeta.style.display = "none";
                }
            });

            // Si no hay resultados visibles en la búsqueda, mostrar un aviso temporal
            const contenedor = document.getElementById('notes-list-container');
            const avisoPrevio = document.getElementById('no-search-results');
            
            if (!resultadosEncontrados && busqueda !== "") {
                if (!avisoPrevio) {
                    const aviso = document.createElement('p');
                    aviso.id = 'no-search-results';
                    aviso.style.cssText = "color: #ef4444; font-size: 0.85rem; text-align: center; padding: 10px;";
                    aviso.innerText = "No se encontraron soluciones que coincidan.";
                    contenedor.appendChild(aviso);
                }
            } else if (avisoPrevio) {
                avisoPrevio.remove();
            }
        }

        // Función para eliminar un apunte específico
        function eliminarNota(id) {
            if (confirm("¿Estás seguro de que quieres borrar esta solución de tu bitácora?")) {
                let notas = JSON.parse(localStorage.getItem('relectronica_notas')) || [];
                notas = notas.filter(nota => nota.id !== id);
                localStorage.setItem('relectronica_notas', JSON.stringify(notas));
                mostrarNotas();
            }
        }
    </script>
</body>
</html>
