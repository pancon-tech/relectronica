<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Relectrónica - Mis Notas de Taller</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="logo.png" alt="Relectrónica Logo" onerror="this.style.display='none'; this.parentElement.innerText='📡'">
        </div>
        <div class="header-info">
            <h1>Relectrónica</h1>
        </div>
    </header>

    <div class="main-content">
        <h2 class="section-title">Anotar Nueva Solución</h2>
        
        <div class="form-container">
            <div class="input-group">
                <label>Modelo del Equipo / N° de Tarjeta:</label>
                <input type="text" id="note-model" placeholder="Ej: Samsung UN40FH5003 / T-CON T315HW04">
            </div>
            <div class="input-group">
                <label>Falla o Síntoma observado:</label>
                <textarea id="note-fault" placeholder="Ej: Pantalla azulada sin video, o parpadea 5 veces"></textarea>
            </div>
            <div class="input-group">
                <label>Solución aplicada (El secreto técnico):</label>
                <textarea id="note-solution" placeholder="Ej: Se cambiaron filtros de 10uF cerca del integrado analógico"></textarea>
            </div>
            <button class="btn-save" onclick="guardarNota()">Guardar en Bitácora</button>
            
            <div class="backup-buttons">
                <button class="btn-backup export" onclick="exportarNotas()">📤 Exportar respaldo</button>
                <button class="btn-backup import" onclick="document.getElementById('importFileInput').click()">📥 Importar respaldo</button>
                <input type="file" id="importFileInput" class="import-file-input" accept=".json" onchange="importarNotas(event)">
            </div>
            <p style="font-size: 0.7rem; color: #6b7c93; margin-top: 10px; text-align: center;">Respalda tus notas o restaura desde un archivo .json</p>
        </div>

        <h2 class="section-title">Buscar Soluciones Guardadas</h2>
        <div class="search-box">
            <input type="text" id="search-input" oninput="filtrarNotas()" placeholder="Escribe marca, modelo o falla...">
        </div>

        <div class="notes-list" id="notes-list-container">
            <!-- Las notas se renderizan dinámicamente -->
        </div>
    </div>

    <nav class="nav-tabs">
        <a href="index.html" class="nav-item">
            <span class="nav-icon">💬</span>
            <span>Chat Técnico</span>
        </a>
        <a href="notas.html" class="nav-item active">
            <span class="nav-icon">📝</span>
            <span>Mis Notas</span>
        </a>
        <a href="biblioteca.html" class="nav-item">
            <span class="nav-icon">📘</span>
            <span>Biblioteca</span>
        </a>
        <a href="hardware.html" class="nav-item">
            <span class="nav-icon">🖼️</span>
            <span>Hardware</span>
        </a>
        <a href="fallas.html" class="nav-item">
            <span class="nav-icon">🛠️</span>
            <span>Casos de Falla</span>
        </a>
        <a href="recepcion.html" class="nav-item">
            <span class="nav-icon">📋</span>
            <span>Recepción</span>
        </a>
    </nav>

    <script>
        // Cargar las notas guardadas apenas se abra la pantalla
        document.addEventListener('DOMContentLoaded', () => {
            mostrarNotas();
        });

        // Función para guardar una nueva solución en el almacenamiento local
        function guardarNota() {
            const modelo = document.getElementById('note-model').value.trim();
            const falla = document.getElementById('note-fault').value.trim();
            const solucion = document.getElementById('note-solution').value.trim();

            if (modelo === "" || falla === "" || solucion === "") {
                alert("Por favor, rellena todos los campos antes de guardar.");
                return;
            }

            // Crear el objeto de la nueva nota
            const nuevaNota = {
                id: Date.now(), // ID único basado en el tiempo
                modelo: modelo,
                falla: falla,
                solucion: solucion
            };

            // Obtener notas existentes o crear un arreglo vacío si es la primera
            let notas = JSON.parse(localStorage.getItem('relectronica_notas')) || [];
            
            // Agregar la nueva nota al inicio de la lista
            notas.unshift(nuevaNota);

            // Guardar de vuelta en el localStorage
            localStorage.setItem('relectronica_notas', JSON.stringify(notas));

            // Limpiar los campos del formulario para la próxima anotación
            document.getElementById('note-model').value = "";
            document.getElementById('note-fault').value = "";
            document.getElementById('note-solution').value = "";

            // Actualizar la lista en pantalla
            mostrarNotas();
        }

        // Renderizar todas las notas
        function mostrarNotas() {
            const contenedor = document.getElementById('notes-list-container');
            const notas = JSON.parse(localStorage.getItem('relectronica_notas')) || [];

            if (notas.length === 0) {
                contenedor.innerHTML = `<p style="color: #94a3b8; font-size: 0.85rem; text-align: center; padding: 20px;">Tu bitácora está vacía. ¡Anota tu primer "cangrejo" resuelto arriba!</p>`;
                return;
            }

            let html = "";
            notas.forEach(nota => {
                // Escapar caracteres especiales para evitar XSS (aunque el contenido es confiable, buena práctica)
                const modeloEscapado = escapeHtml(nota.modelo);
                const fallaEscapada = escapeHtml(nota.falla);
                const solucionEscapada = escapeHtml(nota.solucion);
                html += `
                    <div class="note-card" data-id="${nota.id}">
                        <button class="btn-delete" onclick="eliminarNota(${nota.id})">×</button>
                        <h3>📺 ${modeloEscapado}</h3>
                        <p class="note-text"><b>⚠️ Falla:</b> ${fallaEscapada}</p>
                        <p class="note-text solucion"><b>✅ Solución:</b> ${solucionEscapada}</p>
                    </div>
                `;
            });

            contenedor.innerHTML = html;
        }

        // Helper para escapar HTML
        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }

        // Filtrar notas en tiempo real
        function filtrarNotas() {
            const busqueda = document.getElementById('search-input').value.toLowerCase();
            const tarjetas = document.querySelectorAll('.note-card');
            let resultadosEncontrados = false;

            tarjetas.forEach(tarjeta => {
                const textoTarjeta = tarjeta.innerText.toLowerCase();
                if (textoTarjeta.includes(busqueda)) {
                    tarjeta.style.display = "block";
                    resultadosEncontrados = true;
                } else {
                    tarjeta.style.display = "none";
                }
            });

            const contenedor = document.getElementById('notes-list-container');
            const avisoPrevio = document.getElementById('no-search-results');
            
            if (!resultadosEncontrados && busqueda !== "") {
                if (!avisoPrevio) {
                    const aviso = document.createElement('p');
                    aviso.id = 'no-search-results';
                    aviso.style.cssText = "color: #ef4444; font-size: 0.85rem; text-align: center; padding: 10px;";
                    aviso.innerText = "No se encontraron soluciones que coincidan.";
                    contenedor.appendChild(aviso);
                }
            } else if (avisoPrevio) {
                avisoPrevio.remove();
            }
        }

        // Eliminar una nota específica
        function eliminarNota(id) {
            if (confirm("¿Estás seguro de que quieres borrar esta solución de tu bitácora?")) {
                let notas = JSON.parse(localStorage.getItem('relectronica_notas')) || [];
                notas = notas.filter(nota => nota.id !== id);
                localStorage.setItem('relectronica_notas', JSON.stringify(notas));
                mostrarNotas();
                // Si hay búsqueda activa, refrescamos el filtro
                const searchVal = document.getElementById('search-input').value;
                if (searchVal) filtrarNotas();
            }
        }

        // EXPORTAR: descargar todas las notas como archivo JSON
        function exportarNotas() {
            const notas = JSON.parse(localStorage.getItem('relectronica_notas')) || [];
            if (notas.length === 0) {
                alert("No hay notas para exportar. Guarda alguna solución primero.");
                return;
            }
            const dataStr = JSON.stringify(notas, null, 2);
            const blob = new Blob([dataStr], {type: "application/json"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `relectronica_notas_backup_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // IMPORTAR: leer archivo JSON y reemplazar localStorage
        function importarNotas(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const contenido = e.target.result;
                    const notasImportadas = JSON.parse(contenido);
                    
                    // Validar que sea un arreglo y que cada elemento tenga al menos modelo, falla, solucion (id puede faltar, lo generamos)
                    if (!Array.isArray(notasImportadas)) {
                        throw new Error("El archivo no contiene un array de notas.");
                    }
                    
                    // Sanear: asegurar que cada nota tenga id, modelo, falla, solucion
                    const notasValidas = [];
                    for (let i = 0; i < notasImportadas.length; i++) {
                        const nota = notasImportadas[i];
                        if (nota.modelo && nota.falla && nota.solucion) {
                            notasValidas.push({
                                id: nota.id && typeof nota.id === 'number' ? nota.id : Date.now() + i,
                                modelo: String(nota.modelo),
                                falla: String(nota.falla),
                                solucion: String(nota.solucion)
                            });
                        } else {
                            console.warn("Nota inválida omitida:", nota);
                        }
                    }
                    
                    if (notasValidas.length === 0) {
                        throw new Error("No se encontraron notas válidas en el archivo. Cada nota debe tener modelo, falla y solución.");
                    }
                    
                    if (confirm(`¿Importar ${notasValidas.length} nota(s)? Se reemplazará toda la bitácora actual.`)) {
                        localStorage.setItem('relectronica_notas', JSON.stringify(notasValidas));
                        mostrarNotas();
                        // Limpiar búsqueda después de importar
                        document.getElementById('search-input').value = '';
                        alert("Bitácora restaurada exitosamente.");
                    }
                } catch (error) {
                    console.error(error);
                    alert("Error al importar: " + error.message + "\nAsegúrate de seleccionar un archivo JSON válido exportado desde esta misma app.");
                } finally {
                    // Resetear el input file para permitir cargar el mismo archivo nuevamente
                    document.getElementById('importFileInput').value = '';
                }
            };
            reader.onerror = function() {
                alert("No se pudo leer el archivo.");
                document.getElementById('importFileInput').value = '';
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
