<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relectrónica - Mis Notas de Taller</title>
    <style>
        :root { --bg-color: #0b131f; --chat-bg: #111c2c; --text-color: #ffffff; --primary-color: #7928ca; --border-color: #22344d; --card-bg: #162235; --success-color: #10b981; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 15px; }
        header { background-color: var(--chat-bg); padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        input, textarea { padding: 10px; background: #162235; border: 1px solid var(--border-color); color: white; border-radius: 5px; }
        button { padding: 10px; cursor: pointer; border: none; border-radius: 5px; color: white; font-weight: bold; }
        .btn-add { background: var(--primary-color); }
        .backup-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .tech-card { background: var(--card-bg); padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 4px solid var(--primary-color); }
    </style>
</head>
<body>

    <header>
        <h1>Mis Notas de Taller</h1>
    </header>

    <div class="input-group">
        <input type="text" id="tituloNota" placeholder="Título de la nota...">
        <textarea id="contenidoNota" placeholder="Describe la solución..."></textarea>
        <button class="btn-add" onclick="guardarNota()">Guardar Nota</button>
    </div>

    <div class="backup-container">
        <button onclick="exportarNotas()" style="background:#10b981; flex:1;">💾 Exportar</button>
        <button onclick="document.getElementById('importFile').click()" style="background:#64748b; flex:1;">📂 Importar</button>
        <input type="file" id="importFile" style="display:none" onchange="importarNotas(event)">
    </div>

    <div id="notes-list-container"></div>

    <script>
        function guardarNota() {
            const titulo = document.getElementById('tituloNota').value;
            const contenido = document.getElementById('contenidoNota').value;
            if(!titulo || !contenido) return alert("Completa los campos");
            
            const notas = JSON.parse(localStorage.getItem('relectronica_notas')) || [];
            notas.push({ id: Date.now(), titulo, contenido });
            localStorage.setItem('relectronica_notas', JSON.stringify(notas));
            
            document.getElementById('tituloNota').value = "";
            document.getElementById('contenidoNota').value = "";
            mostrarNotas();
        }

        function mostrarNotas() {
            const contenedor = document.getElementById('notes-list-container');
            const notas = JSON.parse(localStorage.getItem('relectronica_notas')) || [];
            contenedor.innerHTML = "";
            notas.forEach(n => {
                contenedor.innerHTML += `<div class="tech-card"><h3>${n.titulo}</h3><p>${n.contenido}</p>
                <button onclick="eliminarNota(${n.id})" style="background:#ef4444; margin-top:10px;">Eliminar</button></div>`;
            });
        }

        function eliminarNota(id) {
            let notas = JSON.parse(localStorage.getItem('relectronica_notas')) || [];
            notas = notas.filter(n => n.id !== id);
            localStorage.setItem('relectronica_notas', JSON.stringify(notas));
            mostrarNotas();
        }

        function exportarNotas() {
            const notas = localStorage.getItem('relectronica_notas');
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([notas], {type: 'application/json'}));
            a.download = 'backup_relectronica.json';
            a.click();
        }

        function importarNotas(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                localStorage.setItem('relectronica_notas', ev.target.result);
                mostrarNotas();
            };
            reader.readAsText(e.target.files[0]);
        }

        mostrarNotas();
    </script>
</body>
</html>
