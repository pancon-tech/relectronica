<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relectrónica - Hardware Vista Grande</title>
    <style>
        :root {
            --bg-color: #0b131f;
            --chat-bg: #111c2c;
            --text-color: #ffffff;
            --primary-color: #7928ca;
            --border-color: #22344d;
            --card-bg: #162235;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: var(--chat-bg);
            padding: 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            gap: 15px;
        }

        .logo-container {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            overflow: hidden;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-color);
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .header-info h1 {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .header-info p {
            font-size: 0.85rem;
            color: #a0aec0;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #a855f7;
            border-radius: 50%;
            display: inline-block;
        }

        .main-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            margin-bottom: 65px;
        }

        .search-bar {
            width: 100%;
            background-color: var(--chat-bg);
            border: 1px solid var(--border-color);
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            outline: none;
            font-size: 0.95rem;
        }

        .search-bar:focus {
            border-color: var(--primary-color);
        }

        .section-title {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: #a855f7;
            font-weight: 600;
        }

        /* DISEÑO DE LA REJILLA DE IMÁGENES */
        .hardware-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .hardware-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }

        .hardware-card:hover {
            transform: translateY(-2px);
            border-color: var(--primary-color);
        }

        .image-container {
            width: 100%;
            height: 130px;
            background-color: #080d16;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid var(--border-color);
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-info {
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .card-info h3 {
            font-size: 0.9rem;
            color: #fff;
            font-weight: 600;
            line-height: 1.3;
        }

        .card-tag {
            font-size: 0.7rem;
            color: #a5b4fc;
            background-color: #1e1b4b;
            padding: 2px 6px;
            border-radius: 4px;
            align-self: flex-start;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* ─── VENTANA MODAL (PANTALLA COMPLETA PARA AMPLIAR FOTO) ─── */
        .image-modal {
            display: none;
            position: fixed;
            z-index: 999;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(5, 9, 15, 0.95);
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content-container {
            max-width: 95%;
            max-height: 85%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .image-modal img {
            width: 100%;
            height: auto;
            max-height: 70vh;
            object-fit: contain;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .modal-title {
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
            text-align: center;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 25px;
            color: #a0aec0;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-modal:hover {
            color: #fff;
        }

        /* NAVEGACIÓN INFERIOR */
        nav.nav-tabs {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background-color: var(--chat-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #a0aec0;
            text-decoration: none;
            font-size: 0.75rem;
            background: none;
            border: none;
            flex: 1;
            height: 100%;
            justify-content: center;
            gap: 4px;
        }

        .nav-item.active {
            color: #a855f7;
            font-weight: bold;
        }

        .nav-icon {
            font-size: 1.3rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="logo.png" alt="Relectrónica Logo">
        </div>
        <div class="header-info">
            <h1>Relectrónica</h1>
            <p><span class="status-dot"></span> Reconocimiento de Hardware</p>
        </div>
    </header>

    <div class="main-content">
        <input type="text" class="search-bar" id="hardware-search" placeholder="Buscar tarjetas o componentes...">
        
        <h2 class="section-title">Galería de Hardware Técnico</h2>
        
        <div class="hardware-grid">

            <div class="hardware-card" onclick="openImage('imagenes/pTconTT5461B03-2-C-1.png', 'TCON TT5461B03-2-C-1 - Voltajes Clave')">
                <div class="image-container">
                    <img src="imagenes/TconTT5461B03-2-C-1" alt="Tarjeta T-CON">
                </div>
                <div class="card-info">
                    <h3>Tarjeta T-CON</h3>
                    <span class="card-tag">Módulos</span>
                </div>
            </div>

            <div class="hardware-card" onclick="openImage('imagenes/fuente.jpg', 'Fuente Conmutada (SMPS)')">
                <div class="image-container">
                    <img src="imagenes/fuente.jpg" alt="Fuente Conmutada">
                </div>
                <div class="card-info">
                    <h3>Fuente Conmutada</h3>
                    <span class="card-tag">Potencia</span>
                </div>
            </div>

            <div class="hardware-card" onclick="openImage('imagenes/regulador.jpg', 'Regulador de Voltaje TO-220')">
                <div class="image-container">
                    <img src="imagenes/regulador.jpg" alt="Regulador de Voltaje">
                </div>
                <div class="card-info">
                    <h3>Regulador TO-220</h3>
                    <span class="card-tag">Semiconductores</span>
                </div>
            </div>

            <div class="hardware-card" onclick="openImage('imagenes/display.jpg', 'Estructura Interna Display LCD')">
                <div class="image-container">
                    <img src="imagenes/display.jpg" alt="Display LCD">
                </div>
                <div class="card-info">
                    <h3>Panel LCD / Display</h3>
                    <span class="card-tag">Componentes</span>
                </div>
            </div>

        </div>
    </div>

    <div id="myModal" class="image-modal" onclick="closeImage()">
        <span class="close-modal">&times;</span>
        <div class="modal-content-container" onclick="event.stopPropagation()">
            <img id="imgExpanded" src="" alt="Imagen ampliada">
            <div id="modalTitle" class="modal-title"></div>
        </div>
    </div>

    <nav class="nav-tabs">
        <a href="index.html" class="nav-item">
            <span class="nav-icon">💬</span>
            <span>Chat Técnico</span>
        </a>
        <a href="biblioteca.html" class="nav-item">
            <span class="nav-icon">📘</span>
            <span>Biblioteca</span>
        </a>
        <a href="hardware.html" class="nav-item active">
            <span class="nav-icon">🖼️</span>
            <span>Hardware</span>
        </a>
        <a href="fallas.html" class="nav-item">
            <span class="nav-icon">🛠️</span>
            <span>Casos de Falla</span>
        </a>
    </nav>

    <script>
        // Función inteligente para abrir cualquier imagen en grande
        function openImage(imgSrc, titleText) {
            const modal = document.getElementById("myModal");
            const expandedImg = document.getElementById("imgExpanded");
            const modalTitle = document.getElementById("modalTitle");
            
            expandedImg.src = imgSrc;
            modalTitle.innerText = titleText;
            modal.style.display = "flex";
        }

        // Función para cerrar el visor
        function closeImage() {
            document.getElementById("myModal").style.display = "none";
        }

        // Buscador interactivo en tiempo real
        document.getElementById('hardware-search').addEventListener('input', function(e) {
            const query = e.target.value.toLowerCase();
            document.querySelectorAll('.hardware-card').forEach(card => {
                const text = card.innerText.toLowerCase();
                card.style.display = text.includes(query) ? 'flex' : 'none';
            });
        });
    </script>
</body>
    </html>
