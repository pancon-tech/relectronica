<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relectrónica - Asistente Técnico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; }
        .chat-container { height: calc(100vh - 140px); }
    </style>
</head>
<body class="font-sans antialiased flex flex-col h-screen">

    <header class="bg-[#161b22] border-b border-[#30363d] p-4 flex items-center justify-between shadow-md">
        <div class="flex items-center space-x-3">
            <div class="bg-blue-600 text-white p-2 rounded-lg font-bold text-xl">R</div>
            <div>
                <h1 class="text-lg font-bold text-white tracking-wide">Relectrónica</h1>
                <p class="text-xs text-green-400 flex items-center">
                    <span class="w-2 h-2 rounded-full bg-green-400 inline-block mr-1 animate-pulse"></span> 
                    Línea Directa Corregida
                </p>
            </div>
        </div>
    </header>

    <main id="chat-box" class="flex-1 p-4 overflow-y-auto chat-container space-y-4">
        <div class="flex justify-start">
            <div class="bg-[#21262d] border border-[#30363d] text-gray-200 p-3 rounded-lg max-w-[85%] shadow-sm">
                <p class="font-semibold text-blue-400 mb-1">⚡ Relectrónica Bot:</p>
                ¡Hola Jefferson! He reconstruido el protocolo de comunicación por completo. Prueba mandando un mensaje ahora, esta línea está reforzada.
            </div>
        </div>
    </main>

    <footer class="bg-[#161b22] border-t border-[#30363d] p-3 flex items-center space-x-2">
        <input type="text" id="user-input" 
               class="flex-1 bg-[#0d1117] border border-[#30363d] rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 text-sm" 
               placeholder="Escribe la falla...">
        <button id="send-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-5 py-3 rounded-xl transition duration-200 text-sm shadow-md">
            Enviar
        </button>
    </footer>

    <script>
        const HF_TOKEN = "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"; 
        const SYSTEM_INSTRUCTION = "Eres un ingeniero electrónico experto. Tu propósito es ayudar a Jefferson en su taller Relectrónica. Responde en español, claro y directo usando listas y negritas.";

        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        function appendMessage(sender, text, isUser) {
            const messageDiv = document.createElement('div');
            messageDiv.className = isUser ? "flex justify-end" : "flex justify-start";
            
            const contentDiv = document.createElement('div');
            contentDiv.className = isUser 
                ? "bg-blue-600 text-white p-3 rounded-lg max-w-[85%] shadow-sm" 
                : "bg-[#21262d] border border-[#30363d] text-gray-200 p-3 rounded-lg max-w-[85%] shadow-sm";
            
            contentDiv.innerHTML = `<p class="font-semibold text-xs ${isUser ? 'text-blue-200' : 'text-blue-400'} mb-1">${sender}:</p><div>${text.replace(/\n/g, '<br>')}</div>`;
            
            messageDiv.appendChild(contentDiv);
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessageToHuggingFace(userText) {
            const url = "https://api-inference.huggingface.co/models/Qwen/Qwen2.5-7B-Instruct";
            
            // Estructuramos el prompt en el formato JSON puro que exige la API de inferencia básica
            const promptCompleto = `${SYSTEM_INSTRUCTION}\n\nUsuario: ${userText}\nAsistente:`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${HF_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        inputs: promptCompleto,
                        parameters: {
                            max_new_tokens: 500,
                            return_full_text: false
                        },
                        options: {
                            wait_for_model: true
                        }
                    })
                });

                const data = await response.json();
                
                // Manejo riguroso de la respuesta del servidor
                if (response.ok && data && data[0] && data[0].generated_text) {
                    return data[0].generated_text.trim();
                } else if (data.error) {
                    return "⚠️ Respuesta del servidor: " + data.error;
                } else {
                    return "❌ Error en el formato de datos devuelto por Hugging Face.";
                }
            } catch (error) {
                console.error("Error de red:", error);
                return "❌ Error físico de comunicación. Verifica el estado del internet o los permisos de la App.";
            }
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage("Jefferson", text, true);
            userInput.value = "";

            const loadingDiv = document.createElement('div');
            loadingDiv.className = "flex justify-start text-sm text-gray-500 animate-pulse";
            loadingDiv.id = "loading";
            loadingDiv.innerText = "Relectrónica Bot analizando...";
            chatBox.appendChild(loadingDiv);

            const aiResponse = await sendMessageToHuggingFace(text);

            if(document.getElementById('loading')) {
                document.getElementById('loading').remove();
            }
            appendMessage("⚡ Relectrónica Bot", aiResponse, false);
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
    </script>
</body>
</html>
