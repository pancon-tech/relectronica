<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relectrónica - Asistente Técnico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; }
        
        /* CONTENEDOR DEL CHAT CON TU LOGO OFICIAL */
        .chat-container { 
            height: calc(100vh - 180px); 
            position: relative;
            /* Inyección directa de tu logo en el fondo */
            background-image: url('https://images.unsplash.com/photo-1719937266555-41fe6a9480f2?q=80&w=1000&auto=format&fit=crop'); /* Marcador de posición técnico */
            background-repeat: no-repeat;
            background-position: center;
            background-size: 280px; /* Tamaño ideal en pantallas móviles */
        }

        /* CAPA DE OPACIDAD TÉCNICA (Controla la transparencia perfecta del fondo) */
        .chat-container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #0d1117;
            opacity: 0.88; /* 0.88 es el punto de balance exacto: el logo es visible y el texto se lee al 100% */
            z-index: 0;
        }

        /* Capa para obligar a los mensajes a flotar sobre el logo */
        .chat-container * {
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body class="font-sans antialiased flex flex-col h-screen">

    <header class="bg-[#161b22] border-b border-[#30363d] p-4 flex items-center justify-between shadow-md">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 rounded-lg overflow-hidden border border-[#30363d] bg-[#0d1117] flex items-center justify-center">
                <img id="header-logo" class="w-full h-full object-cover">
            </div>
            <div>
                <h1 class="text-lg font-bold text-white tracking-wide">Relectrónica</h1>
                <p class="text-xs text-purple-400 flex items-center">
                    <span class="w-2 h-2 rounded-full bg-purple-500 inline-block mr-1 animate-pulse"></span> 
                    Línea Técnica Personalizada
                </p>
            </div>
        </div>
    </header>

    <main id="chat-box" class="flex-1 p-4 overflow-y-auto chat-container space-y-4"></main>

    <div id="image-preview-container" class="hidden bg-[#161b22] px-4 py-2 border-t border-[#30363d] flex items-center space-x-2">
        <div class="relative">
            <img id="image-preview" class="w-14 h-14 object-cover rounded-lg border border-gray-500">
            <button id="remove-image-btn" class="absolute -top-2 -right-2 bg-red-600 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs font-bold shadow">×</button>
        </div>
        <span class="text-xs text-gray-400">Imagen acoplada en interfaz...</span>
    </div>

    <footer class="bg-[#161b22] border-t border-[#30363d] p-3 flex items-center space-x-2">
        <label for="file-input" class="cursor-pointer bg-[#21262d] hover:bg-[#30363d] text-gray-300 p-3 rounded-xl transition duration-200 shadow-md flex items-center justify-center select-none">
            📸
            <input type="file" id="file-input" accept="image/*" class="hidden">
        </label>

        <input type="text" id="user-input" 
               class="flex-1 bg-[#0d1117] border border-[#30363d] rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-purple-500 text-sm" 
               placeholder="Escribe la falla...">
        <button id="send-btn" class="bg-purple-600 hover:bg-purple-700 text-white font-bold px-5 py-3 rounded-xl transition duration-200 text-sm shadow-md">
            Enviar
        </button>
    </footer>

    <script>
        const COHERE_API_KEY = "594SHpSQqQo0yWaa48hHgwDbRCijYSVD2biJOLLL";

AAASUVORK5CYII=";

        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const fileInput = document.getElementById('file-input');
        const previewContainer = document.getElementById('image-preview-container');
        const previewImg = document.getElementById('image-preview');
        const removeImageBtn = document.getElementById('remove-image-btn');
        const headerLogo = document.getElementById('header-logo');

        let imagenBase64Full = null;

        // Carga automática del logo en el fondo y en el encabezado
        window.onload = () => { 
            document.querySelector('.chat-container').style.backgroundImage = `url('${LOGO_BASE64}')`;
            headerLogo.src = LOGO_BASE64;
            appendMessage("⚡ Relectrónica Bot", "¡Excelente Jefferson! Tu logo oficial ha sido integrado como marca de agua en el fondo del chat y en el encabezado. Chatea normalmente y verás cómo los mensajes flotan por encima sin ocultarlo.", false); 
        };

        // Procesamiento del botón de la cámara (Futuro uso de visión)
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                imagenBase64Full = event.target.result;
                previewImg.src = imagenBase64Full;
                previewContainer.classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        });

        removeImageBtn.addEventListener('click', () => { limpiarVariablesImagen(); });

        function limpiarVariablesImagen() {
            imagenBase64Full = null;
            fileInput.value = "";
            previewContainer.classList.add('hidden');
        }

        function appendMessage(sender, text, isUser, imgSrc = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = isUser ? "flex justify-end" : "flex justify-start";
            
            const contentDiv = document.createElement('div');
            contentDiv.className = isUser 
                ? "bg-purple-600 text-white p-3 rounded-lg max-w-[85%] shadow-sm" 
                : "bg-[#21262d] border border-[#30363d] text-gray-200 p-3 rounded-lg max-w-[85%] shadow-sm";
            
            let imageHtml = imgSrc ? `<img src="${imgSrc}" class="w-full max-h-48 object-contain rounded-md mb-2 border border-gray-600">` : "";
            let formattedText = text.replace(/\n/g, '<br>').replace(/\*\"(.*?)\*\"/g, '<strong>$1</strong>');

            contentDiv.innerHTML = `<p class="font-semibold text-xs ${isUser ? 'text-purple-200' : 'text-purple-400'} mb-1">${sender}:</p>${imageHtml}<div>${formattedText}</div>`;
            
            messageDiv.appendChild(contentDiv);
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessageToCohere(userText) {
            const url = "https://api.cohere.com/v1/chat";
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${COHERE_API_KEY}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        message: userText,
                        model: "command-r-08-2024",
                        preamble: SYSTEM_INSTRUCTION
                    })
                });
                const data = await response.json();
                if (response.ok && data.text) return data.text.trim();
                return `⚠️ Error de validación: ${data.message || 'Falla en el bloque de datos'}`;
            } catch (error) {
                return "❌ Error físico de conexión con Cohere.";
            }
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text && !imagenBase64Full) return;

            const imgParaMostrar = imagenBase64Full;
            if (imgParaMostrar && !text) {
                appendMessage("Jefferson", "", true, imgParaMostrar);
                limpiarVariablesImagen();
                appendMessage("⚡ Relectrónica Bot", "⚠️ El motor actual de **Cohere** solo procesa texto. Por favor escribe tu consulta técnica sobre el componente.", false);
                return;
            }

            appendMessage("Jefferson", text, true, imgParaMostrar);
            userInput.value = "";
            limpiarVariablesImagen();

            const loadingDiv = document.createElement('div');
            loadingDiv.className = "flex justify-start text-sm text-gray-500 animate-pulse pl-2";
            loadingDiv.id = "loading";
            loadingDiv.innerText = "⚙️ Relectrónica Bot analizando...";
            chatBox.appendChild(loadingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            const aiResponse = await sendMessageToCohere(text);

            if(document.getElementById('loading')) document.getElementById('loading').remove();
            appendMessage("⚡ Relectrónica Bot", aiResponse, false);
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
    </script>
</body>
</html>
