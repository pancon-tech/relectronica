<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relectrónica - Chat Técnico</title>
    <style>
        :root {
            --bg-color: #0b131f;
            --chat-bg: #111c2c;
            --text-color: #ffffff;
            --primary-color: #7928ca;
            --border-color: #22344d;
            --accent-color: #a855f7;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: var(--chat-bg);
            padding: 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            gap: 15px;
        }

        .logo-container {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            overflow: hidden;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-color);
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .header-info h1 {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .header-info p {
            font-size: 0.85rem;
            color: #a0aec0;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-color);
            border-radius: 50%;
            display: inline-block;
        }

        .chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            margin-bottom: 80px;
            display: flex;
            flex-direction: column;
            background-image: url('logo.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: 40%;
            background-blend-mode: overlay;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 15px;
            line-height: 1.4;
            font-size: 0.95rem;
            word-wrap: break-word;
        }

        .bot-message {
            background-color: var(--chat-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            align-self: flex-start;
        }

        .user-message {
            background-color: var(--primary-color);
            color: white;
            align-self: flex-end;
        }

        .input-area {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: var(--bg-color);
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 1px solid var(--border-color);
            z-index: 90;
        }

        .input-area input {
            flex: 1;
            background-color: var(--chat-bg);
            border: 1px solid var(--border-color);
            color: white;
            padding: 12px;
            border-radius: 8px;
            outline: none;
        }

        .input-area input:focus {
            border-color: var(--primary-color);
        }

        .send-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .attach-btn {
            background-color: var(--chat-bg);
            border: 1px solid var(--border-color);
            color: #a0aec0;
            padding: 0 12px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="logo.png" alt="Relectrónica Logo">
        </div>
        <div class="header-info">
            <h1>Relectrónica</h1>
            <p><span class="status-dot"></span> Asistente Técnico IA Inteligente</p>
        </div>
    </header>

    <div class="chat-container" id="chatbox">
        <div class="message bot-message">
            ⚡ <strong>Relectrónica Bot:</strong> Código original restaurado con éxito. Chatea normalmente para consultar tus diagramas, componentes o fallas comunes.
        </div>
    </div>

    <div class="input-area">
        <input type="file" id="file-input" accept="image/*" style="display: none;" onchange="handleFile(this)">
        <button class="attach-btn" onclick="document.getElementById('file-input').click()">📎</button>
        
        <input type="text" id="user-input" placeholder="Escribe la falla o consulta técnica..." onkeypress="checkEnter(event)">
        <button class="send-btn" id="send-btn" onclick="sendMessage()">Enviar</button>
    </div>

    <script>
        // CONFIGURACIÓN DE TU LLAVE ORIGINAL REINTEGRADA
        const COHERE_API_KEY = "594SHpSQqQo0yWaa48hHgwDbRCijYSVD2biJOLLL"; 

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const btn = document.getElementById('send-btn');
            const messageText = input.value.trim();
            if (messageText === '') return;

            input.disabled = true;
            btn.disabled = true;

            const chatbox = document.getElementById('chatbox');

            // Mostrar el texto del usuario inmediatamente
            const userDiv = document.createElement('div');
            userDiv.className = 'message user-message';
            userDiv.innerText = messageText;
            chatbox.appendChild(userDiv);
            
            input.value = '';
            chatbox.scrollTop = chatbox.scrollHeight;

            // Burbuja de espera original
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message bot-message';
            loadingDiv.id = 'loading-bot';
            loadingDiv.innerText = "⚡ Relectrónica Bot: Buscando en la base de datos técnica...";
            chatbox.appendChild(loadingDiv);
            chatbox.scrollTop = chatbox.scrollHeight;

            try {
                // Volvemos a la API estructurada simplificada que te respondía perfecto antes de las caídas
                const response = await fetch("https://api.cohere.ai/v1/chat", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${COHERE_API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "command",
                        message: `Actúa como el experto oficial de Relectrónica. Dame una respuesta puramente técnica, directa y en español para la siguiente falla o consulta: ${messageText}`
                    })
                });

                const data = await response.json();
                document.getElementById('loading-bot').remove();

                if (data.text) {
                    const botDiv = document.createElement('div');
                    botDiv.className = 'message bot-message';
                    botDiv.innerHTML = `⚡ <strong>Relectrónica Bot:</strong> ${data.text.trim()}`;
                    chatbox.appendChild(botDiv);
                } else {
                    const errorDiv = document.createElement('div');
                    errorDiv.className = 'message bot-message';
                    errorDiv.innerHTML = `⚠️ <strong>Relectrónica Bot:</strong> Error de lectura. Por favor, repite la consulta de forma directa.`;
                    chatbox.appendChild(errorDiv);
                }
            } catch (error) {
                if (document.getElementById('loading-bot')) {
                    document.getElementById('loading-bot').remove();
                }
                const errorDiv = document.createElement('div');
                errorDiv.className = 'message bot-message';
                errorDiv.innerHTML = `⚠️ <strong>Error de red:</strong> Revisa tu conexión a internet o los estados de tu servidor.`;
                chatbox.appendChild(errorDiv);
            }

            chatbox.scrollTop = chatbox.scrollHeight;
            input.disabled = false;
            btn.disabled = false;
            input.focus();
        }

        function checkEnter(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function handleFile(input) {
            if (input.files && input.files[0]) {
                const chatbox = document.getElementById('chatbox');
                const fileDiv = document.createElement('div');
                fileDiv.className = 'message user-message';
                fileDiv.innerText = `📸 Archivo cargado: ${input.files[0].name}`;
                chatbox.appendChild(fileDiv);
                chatbox.scrollTop = chatbox.scrollHeight;
            }
        }
    </script>
</body>
</html>
