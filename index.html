<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relectrónica - Chat Técnico</title>
    <style>
        :root {
            --bg-color: #0b131f;
            --chat-bg: #111c2c;
            --text-color: #ffffff;
            --primary-color: #7928ca;
            --border-color: #22344d;
            --accent-color: #a855f7;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: var(--chat-bg);
            padding: 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            gap: 15px;
        }

        .logo-container {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            overflow: hidden;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-color);
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .header-info h1 {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .header-info p {
            font-size: 0.85rem;
            color: #a0aec0;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-color);
            border-radius: 50%;
            display: inline-block;
        }

        .chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            margin-bottom: 130px;
            display: flex;
            flex-direction: column;
            background-image: url('logo.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: 40%;
            background-blend-mode: overlay;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 15px;
            line-height: 1.4;
            font-size: 0.95rem;
            word-wrap: break-word;
        }

        .bot-message {
            background-color: var(--chat-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            align-self: flex-start;
        }

        .user-message {
            background-color: var(--primary-color);
            color: white;
            align-self: flex-end;
        }

        .input-area {
            position: fixed;
            bottom: 60px;
            left: 0;
            width: 100%;
            background-color: var(--bg-color);
            padding: 10px 15px;
            display: flex;
            gap: 10px;
            border-top: 1px solid var(--border-color);
            z-index: 90;
        }

        .input-area input {
            flex: 1;
            background-color: var(--chat-bg);
            border: 1px solid var(--border-color);
            color: white;
            padding: 12px;
            border-radius: 8px;
            outline: none;
        }

        .input-area input:focus {
            border-color: var(--primary-color);
        }

        .send-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .attach-btn {
            background-color: var(--chat-bg);
            border: 1px solid var(--border-color);
            color: #a0aec0;
            padding: 0 12px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        nav.nav-tabs {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background-color: var(--chat-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #a0aec0;
            text-decoration: none;
            font-size: 0.72rem;
            flex: 1;
            height: 100%;
            justify-content: center;
            gap: 4px;
        }

        .nav-item.active {
            color: var(--accent-color);
            font-weight: bold;
        }

        .nav-icon {
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="logo.png" alt="Relectrónica Logo">
        </div>
        <div class="header-info">
            <h1>Relectrónica</h1>
            <p><span class="status-dot"></span> Asistente Técnico IA Inteligente</p>
        </div>
    </header>

    <div class="chat-container" id="chatbox">
        </div>

    <div class="input-area">
        <input type="file" id="file-input" accept="image/*" style="display: none;" onchange="handleFile(this)">
        <button class="attach-btn" onclick="document.getElementById('file-input').click()">📎</button>
        
        <input type="text" id="user-input" placeholder="Escribe la falla aquí..." onkeypress="checkEnter(event)">
        <button class="send-btn" id="send-btn" onclick="sendMessage()">Enviar</button>
    </div>

    <nav class="nav-tabs">
        <a href="index.html" class="nav-item active">
            <span class="nav-icon">💬</span>
            <span>Chat Técnico</span>
        </a>
        <a href="biblioteca.html" class="nav-item">
            <span class="nav-icon">📘</span>
            <span>Biblioteca</span>
        </a>
        <a href="fallas.html" class="nav-item">
            <span class="nav-icon">🛠️</span>
            <span>Casos de Falla</span>
        </a>
        <a href="calculadoras.html" class="nav-item">
            <span class="nav-icon">🧮</span>
            <span>Calculadoras</span>
        </a>
    </nav>

    <script>
        // CONFIGURACIÓN DE COHERE CON TU KEY REAL
        const COHERE_API_KEY = "594SHpSQqQo0yWaa48hHgwDbRCijYSVD2biJOLLL"; 
        const SYSTEM_PROMPT = "Eres el asistente técnico experto en electrónica de la marca Relectrónica. Ayudas a diagnosticar fallas en tarjetas de TV, fuentes conmutadas, pantallas LED y circuitos electrónicos. Das respuestas técnicas, precisas, profesionales y en español.";

        let chatHistory = JSON.parse(localStorage.getItem('relectronica_chat')) || [
            { role: "CHATBOT", message: "⚡ <strong>Relectrónica Bot:</strong> ¡Excelente Jefferson! Tu asistente con Cohere está en línea y activo. Chatea normalmente para consultar tus diagramas o fallas." }
        ];

        window.onload = function() {
            renderChat();
        };

        function renderChat() {
            const chatbox = document.getElementById('chatbox');
            chatbox.innerHTML = '';
            chatHistory.forEach(msg => {
                const div = document.createElement('div');
                div.className = msg.role === "USER" ? 'message user-message' : 'message bot-message';
                div.innerHTML = msg.message;
                chatbox.appendChild(div);
            });
            chatbox.scrollTop = chatbox.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const btn = document.getElementById('send-btn');
            const messageText = input.value.trim();
            if (messageText === '' || btn.disabled) return;

            input.disabled = true;
            btn.disabled = true;

            // Guardar e imprimir mensaje del usuario
            chatHistory.push({ role: "USER", message: messageText });
            localStorage.setItem('relectronica_chat', JSON.stringify(chatHistory));
            renderChat();
            input.value = '';

            // Mostrar indicador de carga ("Pensando...")
            const chatbox = document.getElementById('chatbox');
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message bot-message';
            loadingDiv.id = 'loading-bot';
            loadingDiv.innerText = "⚡ Relectrónica Bot: Analizando parámetros...";
            chatbox.appendChild(loadingDiv);
            chatbox.scrollTop = chatbox.scrollHeight;

            // Formatear historial limpio de etiquetas HTML para Cohere
            const formattedHistory = chatHistory.slice(1, -1).map(h => ({
                role: h.role,
                message: h.message.replace(/<\/?[^>]+(>|$)/g, "")
            }));

            try {
                const response = await fetch("https://api.cohere.ai/v1/chat", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${COHERE_API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "command-r-plus",
                        message: messageText,
                        preamble: SYSTEM_PROMPT,
                        chat_history: formattedHistory
                    })
                });

                const data = await response.json();
                document.getElementById('loading-bot').remove();

                if (data.text) {
                    chatHistory.push({ role: "CHATBOT", message: `⚡ <strong>Relectrónica Bot:</strong> ${data.text}` });
                } else {
                    chatHistory.push({ role: "CHATBOT", message: `⚠️ <strong>Error:</strong> No se obtuvo respuesta de la base de datos.` });
                }
            } catch (error) {
                if (document.getElementById('loading-bot')) {
                    document.getElementById('loading-bot').remove();
                }
                chatHistory.push({ role: "CHATBOT", message: `⚠️ <strong>Error de red:</strong> Verifica tu conexión o los límites de tu llave.` });
            }

            localStorage.setItem('relectronica_chat', JSON.stringify(chatHistory));
            renderChat();
            input.disabled = false;
            btn.disabled = false;
            input.focus();
        }

        function checkEnter(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function handleFile(input) {
            if (input.files && input.files[0]) {
                const chatbox = document.getElementById('chatbox');
                const fileDiv = document.createElement('div');
                fileDiv.className = 'message user-message';
                fileDiv.innerText = `📸 Archivo seleccionado: ${input.files[0].name}`;
                chatbox.appendChild(fileDiv);
                chatbox.scrollTop = chatbox.scrollHeight;
            }
        }
    </script>
</body>
</html>
