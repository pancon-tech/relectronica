<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relectrónica - Asistente Técnico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
      {
        "imports": {
          "@google/generative-ai": "https://esm.run/@google/generative-ai"
        }
      }
    </script>
</head>
<body class="font-sans antialiased flex flex-col h-screen bg-[#0d1117] text-[#c9d1d9]">

    <header class="bg-[#161b22] border-b border-[#30363d] p-4 flex items-center justify-between shadow-md">
        <div class="flex items-center space-x-3">
            <div class="bg-blue-600 text-white p-2 rounded-lg font-bold text-xl">R</div>
            <div>
                <h1 class="text-lg font-bold text-white tracking-wide">Relectrónica</h1>
                <p class="text-xs text-blue-400 flex items-center">
                    <span class="w-2 h-2 rounded-full bg-blue-500 inline-block mr-1 animate-pulse"></span> 
                    Protocolo AQ Integrado v1.5
                </p>
            </div>
        </div>
    </header>

    <main id="chat-box" class="flex-1 p-4 overflow-y-auto space-y-4" style="height: calc(100vh - 140px);">
        <div class="flex justify-start">
            <div class="bg-[#21262d] border border-[#30363d] text-gray-200 p-3 rounded-lg max-w-[85%] shadow-sm">
                <p class="font-semibold text-blue-400 mb-1">⚡ Relectrónica Bot:</p>
                ¡Enlace de datos recalibrado para tu clave AQ, Jefferson! El canal está limpio y acoplado. Pásame los componentes o la tarjeta que vamos a chequear.
            </div>
        </div>
    </main>

    <footer class="bg-[#161b22] border-t border-[#30363d] p-3 flex items-center space-x-2">
        <input type="text" id="user-input" 
               class="flex-1 bg-[#0d1117] border border-[#30363d] rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 text-sm" 
               placeholder="Escribe la falla aquí...">
        <button id="send-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-5 py-3 rounded-xl transition duration-200 text-sm shadow-md">
            Enviar
        </button>
    </footer>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        // Coloca aquí tu clave que inicia con AQ. tal cual como la copiaste de AI Studio
        const GEMINI_API_KEY = "AQ.Ab8RN6Jl21cBuaphI0cAs37yQHVhxV3cU01_w6m-RhOVr1S2zw"; 
        
        const SYSTEM_INSTRUCTION = "Eres un ingeniero electrónico experto en reparación de hardware, pantallas LED y circuitos impresos. Tu propósito es ayudar a Jefferson en su taller Relectrónica en Caracas, Venezuela. Responde siempre en español, de forma clara, técnica pero directa, usando viñetas, listas y negritas para facilitar la lectura en el banco de trabajo.";

        // Inicializamos el componente oficial de Google pasándole la llave AQ directamente
        const ai = new GoogleGenerativeAI(GEMINI_API_KEY);
        const model = ai.getGenerativeModel({ 
            model: "gemini-1.5-flash",
            systemInstruction: SYSTEM_INSTRUCTION
        });

        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        function appendMessage(sender, text, isUser) {
            const messageDiv = document.createElement('div');
            messageDiv.className = isUser ? "flex justify-end" : "flex justify-start";
            
            const contentDiv = document.createElement('div');
            contentDiv.className = isUser 
                ? "bg-blue-600 text-white p-3 rounded-lg max-w-[85%] shadow-sm" 
                : "bg-[#21262d] border border-[#30363d] text-gray-200 p-3 rounded-lg max-w-[85%] shadow-sm";
            
            let formattedText = text.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            contentDiv.innerHTML = `<p class="font-semibold text-xs ${isUser ? 'text-blue-200' : 'text-blue-400'} mb-1">${sender}:</p><div>${formattedText}</div>`;
            
            messageDiv.appendChild(contentDiv);
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage("Jefferson", text, true);
            userInput.value = "";

            const loadingDiv = document.createElement('div');
            loadingDiv.className = "flex justify-start text-sm text-gray-500 animate-pulse pl-2";
            loadingDiv.id = "loading";
            loadingDiv.innerText = "⚙️ Relectrónica Bot procesando...";
            chatBox.appendChild(loadingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                // Ejecución directa a través del SDK nativo de Google
                const result = await model.generateContent(text);
                const response = await result.response;
                const aiResponse = response.text();

                if(document.getElementById('loading')) document.getElementById('loading').remove();
                appendMessage("⚡ Relectrónica Bot", aiResponse, false);

            } catch (error) {
                if(document.getElementById('loading')) document.getElementById('loading').remove();
                appendMessage("⚡ Relectrónica Bot", "⚠️ Error en el procesamiento de la clave. Verifica que la llave AQ esté bien copiada en GitHub o prueba con un VPN.", false);
                console.error(error);
            }
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
    </script>
</body>
</html>
