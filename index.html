// CARGA DINÁMICA DE BIBLIOTECA (desde biblioteca.html)
// ==========================================================

async function cargarBiblioteca() {
    try {
        // Intentar cargar desde localStorage primero (caché)
        const bibliotecaCache = localStorage.getItem('relectronica_biblioteca_cache');
        if (bibliotecaCache && bibliotecaCache !== '[]') {
            dictionaryEntries = JSON.parse(bibliotecaCache);
            console.log(`📚 Biblioteca cargada desde caché: ${dictionaryEntries.length} términos`);
            return true;
        }
        
        // Si no hay caché, intentar cargar desde biblioteca.html
        console.log("Cargando biblioteca desde archivo...");
        const response = await fetch('biblioteca.html');
        if (!response.ok) throw new Error('No se pudo cargar biblioteca.html');
        
        const html = await response.text();
        
        // Buscar el array dictionaryEntries en el script
        const regex = /const dictionaryEntries = (\[[\s\S]*?\]);/;
        const match = html.match(regex);
        
        if (match && match[1]) {
            try {
                // Usar Function en lugar de eval para mayor seguridad
                const evalFunc = new Function('return ' + match[1]);
                dictionaryEntries = evalFunc();
                localStorage.setItem('relectronica_biblioteca_cache', JSON.stringify(dictionaryEntries));
                console.log(`📚 Biblioteca cargada desde archivo: ${dictionaryEntries.length} términos`);
                return true;
            } catch(e) {
                console.error("Error parsing dictionary:", e);
            }
        } else {
            console.warn("No se encontró dictionaryEntries en biblioteca.html");
        }
        return false;
    } catch (error) {
        console.error('Error cargando biblioteca:', error);
        return false;
    }
}

// ==========================================================
// CARGA DINÁMICA DE CASOS DE FALLA (desde fallas.html)
// ==========================================================

async function cargarCasosDeFalla() {
    try {
        // Intentar cargar desde localStorage primero
        const fallasCache = localStorage.getItem('relectronica_fallas_cache');
        if (fallasCache && fallasCache !== '[]') {
            fallasPredefinidas = JSON.parse(fallasCache);
            console.log(`🛠️ Casos cargados desde caché: ${fallasPredefinidas.length} casos`);
            return true;
        }
        
        console.log("Cargando casos de falla desde archivo...");
        const response = await fetch('fallas.html');
        if (!response.ok) throw new Error('No se pudo cargar fallas.html');
        
        const html = await response.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const techCards = doc.querySelectorAll('.tech-card');
        
        fallasPredefinidas = [];
        techCards.forEach((card, index) => {
            const tituloElem = card.querySelector('h3');
            const contenidoElem = card.querySelector('.tech-card-content');
            
            if (tituloElem && contenidoElem) {
                let titulo = tituloElem.innerText.trim();
                let contenido = contenidoElem.innerText.trim();
                
                let falla = "";
                let solucion = "";
                
                const fallaMatch = contenido.match(/S[íi]ntoma:?\s*(.*?)(?=Soluci[óo]n:|$)/i);
                const solucionMatch = contenido.match(/Soluci[óo]n:?\s*(.*?)$/i);
                
                falla = fallaMatch ? fallaMatch[1].trim() : titulo;
                solucion = solucionMatch ? solucionMatch[1].trim() : contenido;
                
                fallasPredefinidas.push({
                    id: index + 1,
                    term: titulo.split('-')[0].trim(),
                    falla: falla,
                    solucion: solucion
                });
            }
        });
        
        localStorage.setItem('relectronica_fallas_cache', JSON.stringify(fallasPredefinidas));
        console.log(`🛠️ Casos cargados desde archivo: ${fallasPredefinidas.length} casos`);
        return true;
        
    } catch (error) {
        console.error('Error cargando casos de falla:', error);
        return false;
    }
}

// BÚSQUEDA EN BASE LOCAL
// ==========================================================

function buscarEnBaseLocal(query) {
    const resultados = [];
    const queryLower = query.toLowerCase();
    
    // Buscar en biblioteca técnica
    for (const entry of dictionaryEntries) {
        if (entry.term && entry.term.toLowerCase().includes(queryLower) ||
            (entry.description && entry.description.toLowerCase().includes(queryLower)) ||
            (entry.tip && entry.tip.toLowerCase().includes(queryLower)) ||
            (entry.extra && entry.extra.toLowerCase().includes(queryLower))) {
            resultados.push({
                fuente: "📘 Biblioteca Técnica",
                titulo: entry.term,
                contenido: `**${entry.term}**: ${entry.description || ''}\n🔧 Tip: ${entry.tip || 'No disponible'}${entry.extra ? '\n📌 Extra: ' + entry.extra : ''}`,
                relevancia: 10
            });
        }
    }
    
    // Buscar en casos de falla
    for (const falla of fallasPredefinidas) {
        if (falla.term && falla.term.toLowerCase().includes(queryLower) ||
            (falla.falla && falla.falla.toLowerCase().includes(queryLower)) ||
            (falla.solucion && falla.solucion.toLowerCase().includes(queryLower))) {
            resultados.push({
                fuente: "🛠️ Casos de Falla",
                titulo: (falla.falla || falla.term).substring(0, 50),
                contenido: `**Caso**: ${falla.falla || falla.term}\n✅ **Solución**: ${falla.solucion || ''}`,
                relevancia: 9
            });
        }
    }
    
    // Buscar en notas del usuario
    const notas = obtenerNotasUsuario();
    for (const nota of notas) {
        if ((nota.modelo && nota.modelo.toLowerCase().includes(queryLower)) ||
            (nota.falla && nota.falla.toLowerCase().includes(queryLower)) ||
            (nota.solucion && nota.solucion.toLowerCase().includes(queryLower))) {
            resultados.push({
                fuente: "📝 Tus Notas",
                titulo: nota.modelo || "Nota guardada",
                contenido: `**Modelo**: ${nota.modelo || 'N/A'}\n⚠️ **Falla**: ${nota.falla || ''}\n✅ **Tu Solución**: ${nota.solucion || ''}`,
                relevancia: 8
            });
        }
    }
    
    return resultados;
}

function construirContextoLocal(query) {
    const resultados = buscarEnBaseLocal(query);
    if (resultados.length === 0) return null;
    
    let contexto = "📚 **INFORMACIÓN ENCONTRADA EN TU BASE LOCAL**:\n\n";
    for (let i = 0; i < Math.min(resultados.length, 5); i++) {
        const r = resultados[i];
        contexto += `**[${r.fuente}] ${r.titulo}**\n${r.contenido}\n\n---\n\n`;
    }
    contexto += "Basándote en esta información técnica local (prioritaria) y en tus conocimientos de electrónica, responde la consulta.";
    return contexto;
}

function appendMessageToDOM(sender, text, isError = false, imageSrc = null) {
    const msgDiv = document.createElement('div');
    msgDiv.classList.add('message');
    msgDiv.classList.add(sender === 'bot' ? 'bot-message' : 'user-message');
    if (isError) msgDiv.classList.add('error-message');
    
    const metaSpan = document.createElement('span');
    metaSpan.classList.add('msg-meta');
    metaSpan.classList.add(sender === 'bot' ? 'bot-meta' : 'user-meta');
    metaSpan.innerText = sender === 'bot' ? '⚡ Relectrónica Bot:' : 'Jefferson:';
    
    msgDiv.appendChild(metaSpan);
    
    if (text) {
        const lines = text.split('\n');
        lines.forEach((line, index) => {
            let processedLine = line.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            if (processedLine.includes('<strong>')) {
                const span = document.createElement('span');
                span.innerHTML = processedLine;
                msgDiv.appendChild(span);
            } else {
                msgDiv.appendChild(document.createTextNode(line));
            }
            if (index < lines.length - 1) msgDiv.appendChild(document.createElement('br'));
        });
    }
    
    if (imageSrc) {
        const img = document.createElement('img');
        img.src = imageSrc;
        img.classList.add('chat-image');
        msgDiv.appendChild(img);
    }
    
    chatContainer.appendChild(msgDiv);
    chatContainer.scrollTop = chatContainer.scrollHeight;
}

function saveMessageToHistory(sender, text, isError = false, imageSrc = null) {
    chatHistory.push({ sender, text, isError, imageSrc });
    if (chatHistory.length > 100) chatHistory.shift();
    localStorage.setItem('relectronica_chat_history', JSON.stringify(chatHistory));
}

                    });
                    
                    const data = await response.json();
                    
                    if (response.ok) {
                        if (usóLocal) respuestaFinal += "\n\n🤖 **Información adicional:**\n\n" + data.text;
                        else respuestaFinal = data.text;
                    } else if (!usóLocal) {
                        respuestaFinal = "⚠️ Error de conexión. Intenta de nuevo.";
                    }
                }
                
                if (respuestaFinal) {
                    appendMessageToDOM('bot', respuestaFinal);
                    saveMessageToHistory('bot', respuestaFinal);
                    hablarTexto(respuestaFinal);
                } else {
                    appendMessageToDOM('bot', "No encontré información en tu base local.", true);
                }
            } catch (error) {
                appendMessageToDOM('bot', '⚠️ Error de red.', true);
            } finally {
                inputField.disabled = false;
                sendBtn.disabled = false;
                attachBtn.disabled = false;
                inputField.focus();
            }
        }
        
        // Event Listeners
        sendBtn.addEventListener('click', sendMessage);
        inputField.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
        attachBtn.addEventListener('click', () => fileInput.click());
        syncBtn.addEventListener('click', () => sincronizarBaseLocal());
        
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                selectedImageBase64 = event.target.result.split(',')[1];
                imagePreview.src = event.target.result;
                imagePreviewContainer.style.display = 'flex';
            };
            reader.readAsDataURL(file);
        });
        
        cancelImageBtn.addEventListener('click', () => {
            selectedImageBase64 = null;
            fileInput.value = '';
            imagePreviewContainer.style.display = 'none';
        });
        
        clearBtn.addEventListener('click', () => {
            if (confirm('¿Borrar toda la conversación?')) {
                if ('speechSynthesis' in window) window.speechSynthesis.cancel();
                localStorage.removeItem('relectronica_chat_history');
                chatHistory = [];
                chatContainer.innerHTML = '';
                appendMessageToDOM('bot', 'Historial borrado. ¡Estoy listo para ayudarte!');
                saveMessageToHistory('bot', 'Historial borrado. ¡Estoy listo para ayudarte!');
            }
        });
        
        // Reconocimiento de voz
        function inicializarReconocimientoVoz() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return;
            reconocimientoVoz = new SpeechRecognition();
            reconocimientoVoz.lang = 'es-VE';
            reconocimientoVoz.continuous = false;
            reconocimientoVoz.interimResults = false;
            reconocimientoVoz.onstart = () => {
                estaEscuchando = true;
                micBtn.classList.add('mic-escuchando');
                micBtn.innerHTML = "🛑";
                inputField.placeholder = "Escuchando...";
            };
            reconocimientoVoz.onerror = () => forzarApagadoMic();
            reconocimientoVoz.onend = () => forzarApagadoMic();
            reconocimientoVoz.onresult = (event) => {
                const texto = event.results[0][0].transcript;
                if (texto.trim()) {
                    inputField.value = texto;
                    sendMessage();
                }
            };
        }
        
        function forzarApagadoMic() {
            estaEscuchando = false;
            micBtn.classList.remove('mic-escuchando');
            micBtn.innerHTML = "🎙️";
            inputField.placeholder = "Escribe la falla o habla con manos libres...";
        }
        
        function hablarTexto(texto) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(texto.replace(/[*#_⚡|]/g, ''));
                utterance.lang = 'es-ES';
                utterance.rate = 1.05;
                window.speechSynthesis.speak(utterance);
            }
        }
        
        window.alternarMicrofono = function() {
            if (!reconocimientoVoz) {
                alert("Voz no soportada");
                return;
            }
            if (estaEscuchando) reconocimientoVoz.stop();
            else {
                if ('speechSynthesis' in window) window.speechSynthesis.cancel();
                reconocimientoVoz.start();
            }
        };
    </script>
</body>
</html>
