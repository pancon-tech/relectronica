<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relectrónica Bot - Línea Técnica</title>
    <link rel="stylesheet" href="estilos.css">
</head>

<body>

    <header>
        <div class="logo-container">
            <img src="logo.png" alt="Relectrónica Logo">
        </div>
        <div class="header-info">
            <h1>Relectrónica</h1>
            <p><span class="status-dot"></span> Línea Técnica Personalizada</p>
        </div>
        <button class="clear-btn" id="clear-btn" title="Borrar Historial">🗑️</button>
    </header>

    <div id="chat-container"></div>

    <div class="footer-controls">
        <div id="image-preview-container">
            <div class="preview-box">
                <img id="image-preview" src="" alt="Preview">
                <button class="remove-preview" id="cancel-image-btn">×</button>
            </div>
            <span style="font-size: 0.85rem; color: #a0aec0;">Imagen lista para analizar</span>
        </div>

        <div class="input-container">
            <input type="file" id="file-input" accept="image/*" style="display: none;">
            <button class="icon-btn" id="attach-btn" title="Adjuntar imagen">📎</button>
            
            <button class="icon-btn" id="mic-btn" title="Hablar con el Bot" onclick="alternarMicrofono()">🎙️</button>
                    
            <input type="text" id="input-field" placeholder="Escribe la falla o habla con manos libres..." autocomplete="off">
            <button id="send-btn">Enviar</button>
        </div>
    </div>

    <nav class="nav-tabs">
        <nav class="nav-tabs">
        <a href="index.html" class="nav-item">
            <span class="nav-icon">💬</span>
            <span>Chat Técnico</span>
        </a>
        <a href="notas.html" class="nav-item">
            <span class="nav-icon">📝</span>
            <span>Mis Notas</span>
        </a>
        <a href="biblioteca.html" class="nav-item">
            <span class="nav-icon">📘</span>
            <span>Biblioteca</span>
        </a>
        <a href="hardware.html" class="nav-item">
            <span class="nav-icon">🖼️</span>
            <span>Hardware</span>
        </a>
            <a href="calculadoras.html" class="nav-item">
            <span class="nav-icon">🧮</span>
            <span>Cálculos</span>
            </a>
        <a href="fallas.html" class="nav-item">
            <span class="nav-icon">🛠️</span>
            <span>Casos de Falla</span>
        </a>
        <a href="recepcion.html" class="nav-item">
            <span class="nav-icon">📋</span>
            <span>Recepción</span>
        </a>
    </nav>

                                            <script>
        const COHERE_API_KEY = "594SHpSQqQo0yWaa48hHgwDbRCijYSVD2biJOLLL"; 
        
        const chatContainer = document.getElementById('chat-container');
        const inputField = document.getElementById('input-field');
        const sendBtn = document.getElementById('send-btn');
        const fileInput = document.getElementById('file-input');
        const attachBtn = document.getElementById('attach-btn');
        const imagePreviewContainer = document.getElementById('image-preview-container');
        const imagePreview = document.getElementById('image-preview');
        const cancelImageBtn = document.getElementById('cancel-image-btn');
        const clearBtn = document.getElementById('clear-btn');
        const micBtn = document.getElementById('mic-btn');

        let selectedImageBase64 = null;
        let chatHistory = [];
        let reconocimientoVoz = null;
        let estaEscuchando = false;

        window.addEventListener('DOMContentLoaded', () => {
            const savedChat = localStorage.getItem('relectronica_chat_history');
            if (savedChat) {
                chatHistory = JSON.parse(savedChat);
                chatHistory.forEach(msg => {
                    appendMessageToDOM(msg.sender, msg.text, msg.isError, msg.imageSrc);
                });
            } else {
                const welcomeText = '¡Excelente Jefferson! Tu logo oficial ha sido integrado como marca de agua en el fondo del chat y en el encabezado. Chatea normalmente y verás cómo los mensajes flotan por encima sin ocultarlo.';
                appendMessageToDOM('bot', welcomeText);
                saveMessageToHistory('bot', welcomeText);
            }
            // Inicializar motor de voz del celular
            inicializarReconocimientoVoz();
        });

        attachBtn.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                selectedImageBase64 = event.target.result.split(',')[1];
                imagePreview.src = event.target.result;
                imagePreviewContainer.style.display = 'flex';
            };
            reader.readAsDataURL(file);
        });

        cancelImageBtn.addEventListener('click', () => {
            selectedImageBase64 = null;
            fileInput.value = '';
            imagePreviewContainer.style.display = 'none';
        });

        clearBtn.addEventListener('click', () => {
            if (confirm('¿Quieres vaciar toda la conversación actual?')) {
                if ('speechSynthesis' in window) window.speechSynthesis.cancel();
                localStorage.removeItem('relectronica_chat_history');
                chatHistory = [];
                chatContainer.innerHTML = '';
                const welcomeText = 'Bienvenido a Relectrónica. Asistencia técnica abierta a cualquier consulta sobre reparaciones eléctricas y electrónicas: mediciones, componentes, esquemas o calibración. El sistema está disponible para resolver dudas técnicas con precisión.';
                appendMessageToDOM('bot', welcomeText);
                saveMessageToHistory('bot', welcomeText);
            }
        });

        function appendMessageToDOM(sender, text, isError = false, imageSrc = null) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.classList.add(sender === 'bot' ? 'bot-message' : 'user-message');
            if (isError) msgDiv.classList.add('error-message');

            const metaSpan = document.createElement('span');
            metaSpan.classList.add('msg-meta');
            metaSpan.classList.add(sender === 'bot' ? 'bot-meta' : 'user-meta');
            metaSpan.innerText = sender === 'bot' ? '⚡ Relectrónica Bot:' : 'Jefferson:';

            msgDiv.appendChild(metaSpan);
            
            if (text) {
                const formattedText = text.split('\n');
                formattedText.forEach((line, index) => {
                    msgDiv.appendChild(document.createTextNode(line));
                    if (index < formattedText.length - 1) {
                        msgDiv.appendChild(document.createElement('br'));
                    }
                });
            }

            if (imageSrc) {
                const img = document.createElement('img');
                img.src = imageSrc;
                img.classList.add('chat-image');
                msgDiv.appendChild(img);
            }

            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function saveMessageToHistory(sender, text, isError = false, imageSrc = null) {
            chatHistory.push({ sender, text, isError, imageSrc });
            localStorage.setItem('relectronica_chat_history', JSON.stringify(chatHistory));
        }

        async function sendMessage() {
            const query = inputField.value.trim();
            if (!query && !selectedImageBase64) return;

            const currentImageSrc = imagePreview.src;
            const activeImageBase64 = selectedImageBase64;
            
            appendMessageToDOM('user', query, false, activeImageBase64 ? currentImageSrc : null);
            saveMessageToHistory('user', query, false, activeImageBase64 ? currentImageSrc : null);
            
            inputField.value = '';
            selectedImageBase64 = null;
            fileInput.value = '';
            imagePreviewContainer.style.display = 'none';

            inputField.disabled = true;
            sendBtn.disabled = true;
            attachBtn.disabled = true;

            try {
                const response = await fetch('https://api.cohere.ai/v1/chat', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${COHERE_API_KEY}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'command-r-08-2024',
                        message: query || "Por favor analiza la imagen que te adjunto para esta consulta técnica.",
                        preamble: "Eres un asistente técnico experto en electrónica, hardware, diagnóstico de tarjetas PCB y reparación de pantallas LED. Responde de forma precisa y profesional a Jefferson."
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    appendMessageToDOM('bot', data.text);
                    saveMessageToHistory('bot', data.text);
                    
                    // Lee automáticamente la respuesta de Cohere en voz alta
                    hablarTexto(data.text);
                } else {
                    appendMessageToDOM('bot', `⚠️ Error de validación: ${data.message || 'Error desconocido.'}`, true);
                }

            } catch (error) {
                appendMessageToDOM('bot', '⚠️ Error de red: No se pudo conectar con el servidor.', true);
                console.error(error);
            } finally {
                inputField.disabled = false;
                sendBtn.disabled = false;
                attachBtn.disabled = false;
                inputField.focus();
            }
        }

        sendBtn.addEventListener('click', sendMessage);

        inputField.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });


        // ==========================================================
        // MOTOR REVISADO Y OPTIMIZADO PARA MANOS LIBRES POR VOZ
        // ==========================================================

        function inicializarReconocimientoVoz() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            
            if (!SpeechRecognition) {
                console.log("El navegador no soporta SpeechRecognition de forma nativo.");
                return;
            }

            reconocimientoVoz = new SpeechRecognition();
            reconocimientoVoz.lang = 'es-VE'; // Dialecto de Venezuela
            reconocimientoVoz.continuous = false;
            reconocimientoVoz.interimResults = false;

            reconocimientoVoz.onstart = () => {
                estaEscuchando = true;
                micBtn.classList.add('mic-escuchando');
                micBtn.innerHTML = "🛑";
                inputField.placeholder = "Escuchando diagnóstico...";
            };

            reconocimientoVoz.onerror = (event) => {
                console.error("Error de voz detectado:", event.error);
                forzarApagadoMic();
            };

            reconocimientoVoz.onend = () => {
                forzarApagadoMic();
            };

            reconocimientoVoz.onresult = function(event) {
                const textoEscuchado = event.results[0][0].transcript;
                if (textoEscuchado.trim() !== "") {
                    inputField.value = textoEscuchado;
                    // Auto-envío en silencio inmediato
                    sendMessage();
                }
            };
        }

        function alternarMicrofono() {
            if (!reconocimientoVoz) {
                alert("Tu dispositivo o navegador no soporta el reconocimiento de voz.");
                return;
            }

            if (estaEscuchando) {
                reconocimientoVoz.stop();
            } else {
                if ('speechSynthesis' in window) window.speechSynthesis.cancel(); // Mudece al bot si estaba hablando antes
                reconocimientoVoz.start();
            }
        }

        function forzarApagadoMic() {
            estaEscuchando = false;
            micBtn.classList.remove('mic-escuchando');
            micBtn.innerHTML = "🎙️";
            inputField.placeholder = "Escribe la falla o habla con manos libres...";
        }

        function hablarTexto(texto) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // Frena lecturas colgadas
                
                // Remueve caracteres innecesarios o técnicos de pantalla para que la voz no se tranque
                const textoLimpio = texto.replace(/[*#_⚡|⚠️|💡|📟|🎨|🔗|📉|🔋\[\]\(\)]/g, '');
                const utterance = new SpeechSynthesisUtterance(textoLimpio);
                utterance.lang = 'es-ES';
                
                const voces = window.speechSynthesis.getVoices();
                const vocesEspanol = voces.filter(voz => voz.lang.startsWith('es'));
                
                if (vocesEspanol.length > 0) {
                    // Busca una voz estable en español del sistema operativo
                    utterance.voice = vocesEspanol[0]; 
                }

                utterance.rate = 1.05; // Un toque más dinámico para no aburrir
                utterance.pitch = 1.0; 

                window.speechSynthesis.speak(utterance);
            }
        }

        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = function() {
                window.speechSynthesis.getVoices();
            };
        }
    </script>
</body>
</html>
