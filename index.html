<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relectrónica Bot - Línea Técnica</title>
    <style>
        :root {
            --bg-color: #0b131f;
            --chat-bg: #111c2c;
            --text-color: #ffffff;
            --primary-color: #7928ca;
            --bot-msg-bg: #1a273a;
            --user-msg-bg: #7928ca;
            --border-color: #22344d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background-color: var(--chat-bg);
            padding: 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            gap: 15px;
        }

        .logo-container {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            overflow: hidden;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-color);
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .header-info h1 {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .header-info p {
            font-size: 0.85rem;
            color: #a0aec0;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #a855f7;
            border-radius: 50%;
            display: inline-block;
        }

        #chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
        }

        /* Marca de agua de fondo con el logo */
        #chat-container::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            background-image: url('logo.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0.04;
            pointer-events: none;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
            position: relative;
            z-index: 1;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bot-message {
            background-color: var(--bot-msg-bg);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border-color);
        }

        .user-message {
            background-color: var(--user-msg-bg);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .msg-meta {
            font-size: 0.75rem;
            font-weight: bold;
            margin-bottom: 5px;
            display: block;
        }

        .bot-meta { color: #a855f7; }
        .user-meta { color: #e2e8f0; }

        .error-message {
            background-color: #2d191e;
            border: 1px solid #f56565;
            color: #fc8181;
        }

        .input-container {
            background-color: var(--chat-bg);
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 1px solid var(--border-color);
        }

        #input-field {
            flex: 1;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
        }

        #input-field:focus {
            border-color: var(--primary-color);
        }

        #send-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        #send-btn:hover {
            background-color: #6b21a8;
        }

        #send-btn:disabled {
            background-color: #4c1d95;
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="logo.png" alt="Relectrónica Logo" onerror="this.style.display='none';">
        </div>
        <div class="header-info">
            <h1>Relectrónica</h1>
            <p><span class="status-dot"></span> Línea Técnica Personalizada</p>
        </div>
    </header>

    <div id="chat-container">
        </div>

    <div class="input-container">
        <input type="text" id="input-field" placeholder="Escribe la falla aquí..." autocomplete="off">
        <button id="send-btn">Enviar</button>
    </div>

    <script>
        // CONFIGURACIÓN DE APIS (Key integrada con éxito)
        const COHERE_API_KEY = "594SHpSQqQo0yWaa48hHgwDbRCijYSVD2biJOLLL"; 
        
        const chatContainer = document.getElementById('chat-container');
        const inputField = document.getElementById('input-field');
        const sendBtn = document.getElementById('send-btn');

        // Mensaje de Bienvenida Oficial
        window.addEventListener('DOMContentLoaded', () => {
            appendMessage('bot', '¡Excelente Jefferson! Tu logo oficial ha sido integrado como marca de agua en el fondo del chat y en el encabezado. Chatea normalmente y verás cómo los mensajes flotan por encima sin ocultarlo.');
        });

        function appendMessage(sender, text, isError = false) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.classList.add(sender === 'bot' ? 'bot-message' : 'user-message');
            if (isError) msgDiv.classList.add('error-message');

            const metaSpan = document.createElement('span');
            metaSpan.classList.add('msg-meta');
            metaSpan.classList.add(sender === 'bot' ? 'bot-meta' : 'user-meta');
            metaSpan.innerText = sender === 'bot' ? '⚡ Relectrónica Bot:' : 'Jefferson:';

            msgDiv.appendChild(metaSpan);
            
            // Reemplazar saltos de línea para estructurar los datos técnicos de las tarjetas o fallas
            const formattedText = text.split('\n');
            formattedText.forEach((line, index) => {
                msgDiv.appendChild(document.createTextNode(line));
                if (index < formattedText.length - 1) {
                    msgDiv.appendChild(document.createElement('br'));
                }
            });

            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function sendMessage() {
            const query = inputField.value.trim();
            if (!query) return;

            appendMessage('user', query);
            inputField.value = '';
            inputField.disabled = true;
            sendBtn.disabled = true;

            try {
                const response = await fetch('https://api.cohere.ai/v1/chat', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${COHERE_API_KEY}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        // Modelo vigente y con soporte oficial
                        model: 'command-r-plus',
                        message: query,
                        preamble: "Eres un asistente técnico experto en electrónica, hardware, diagnóstico de tarjetas PCB y reparación de pantallas LED. Responde de forma precisa y profesional a Jefferson."
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    appendMessage('bot', data.text);
                } else {
                    appendMessage('bot', `⚠️ Error de validación: ${data.message || 'Error desconocido en la API.'}`, true);
                }

            } catch (error) {
                appendMessage('bot', '⚠️ Error de red: No se pudo conectar con el servidor de datos.', true);
                console.error(error);
            } finally {
                inputField.disabled = false;
                sendBtn.disabled = false;
                inputField.focus();
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        inputField.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
