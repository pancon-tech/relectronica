<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relectrónica - Asistente Técnico</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="font-sans antialiased flex flex-col h-screen bg-[#0d1117] text-[#c9d1d9]">

    <header class="bg-[#161b22] border-b border-[#30363d] p-4 flex items-center justify-between shadow-md">
        <div class="flex items-center space-x-3">
            <div class="bg-green-600 text-white p-2 rounded-lg font-bold text-xl">R</div>
            <div>
                <h1 class="text-lg font-bold text-white tracking-wide">Relectrónica</h1>
                <p class="text-xs text-green-400 flex items-center">
                    <span class="w-2 h-2 rounded-full bg-green-500 inline-block mr-1 animate-pulse"></span> 
                    Motor Groq Activo (Llama 3.1)
                </p>
            </div>
        </div>
    </header>

    <main id="chat-box" class="flex-1 p-4 overflow-y-auto space-y-4" style="height: calc(100vh - 140px);"></main>

    <footer class="bg-[#161b22] border-t border-[#30363d] p-3 flex items-center space-x-2">
        <input type="text" id="user-input" class="flex-1 bg-[#0d1117] border border-[#30363d] rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-green-500 text-sm" placeholder="Escribe la falla aquí...">
        <button id="send-btn" class="bg-green-600 hover:bg-green-700 text-white font-bold px-5 py-3 rounded-xl transition duration-200 text-sm shadow-md">Enviar</button>
    </footer>

    <script>
        // Tu clave de Groq asignada directamente en el circuito
        const GROQ_API_KEY = "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"; 

        const SYSTEM_INSTRUCTION = "Eres un ingeniero electrónico experto en reparación de hardware, pantallas LED y circuitos impresos. Tu propósito es ayudar a Jefferson en su taller Relectrónica en Caracas, Venezuela. Responde siempre en español, de forma clara, técnica pero directa, usando viñetas, listas y negritas para facilitar la lectura en el banco de trabajo.";

        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        // Mensaje de bienvenida inicial en el banco de pruebas
        window.onload = () => { 
            appendMessage("⚡ Relectrónica Bot", "¡Excelente Jefferson! Sistema encendido con el motor de Groq. El puente de datos está libre de bloqueos de Google. Pásame la falla o el modelo de la tarjeta para empezar el diagnóstico.", false); 
        };

        function appendMessage(sender, text, isUser) {
            const messageDiv = document.createElement('div');
            messageDiv.className = isUser ? "flex justify-end" : "flex justify-start";
            
            const contentDiv = document.createElement('div');
            contentDiv.className = isUser 
                ? "bg-green-600 text-white p-3 rounded-lg max-w-[85%] shadow-sm" 
                : "bg-[#21262d] border border-[#30363d] text-gray-200 p-3 rounded-lg max-w-[85%] shadow-sm";
            
            let formattedText = text.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            contentDiv.innerHTML = `<p class="font-semibold text-xs ${isUser ? 'text-green-200' : 'text-green-400'} mb-1">${sender}:</p><div>${formattedText}</div>`;
            
            messageDiv.appendChild(contentDiv);
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage("Jefferson", text, true);
            userInput.value = "";

            const loadingDiv = document.createElement('div');
            loadingDiv.className = "flex justify-start text-sm text-gray-500 animate-pulse pl-2";
            loadingDiv.id = "loading";
            loadingDiv.innerText = "⚙️ Procesando señal en el servidor...";
            chatBox.appendChild(loadingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${GROQ_API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [
                            { role: "system", content: SYSTEM_INSTRUCTION },
                            { role: "user", content: text }
                        ]
                    })
                });

                const data = await response.json();
                if (document.getElementById('loading')) document.getElementById('loading').remove();

                if (response.ok && data.choices && data.choices[0].message.content) {
                    appendMessage("⚡ Relectrónica Bot", data.choices[0].message.content.trim(), false);
                } else {
                    appendMessage("⚡ Relectrónica Bot", `⚠️ Error del servidor: ${data.error ? data.error.message : 'Falla de lectura'}`, false);
                }
            } catch (error) {
                if (document.getElementById('loading')) document.getElementById('loading').remove();
                appendMessage("⚡ Relectrónica Bot", "❌ Error de conexión física con el servidor de Groq.", false);
                console.error(error);
            }
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
    </script>
</body>
</html>
