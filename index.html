<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relectrónica Bot - Línea Técnica</title>
    <style>
        :root {
            --bg-color: #0b131f;
            --chat-bg: #111c2c;
            --text-color: #ffffff;
            --primary-color: #7928ca;
            --bot-msg-bg: #1a273a;
            --user-msg-bg: #7928ca;
            --border-color: #22344d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: var(--chat-bg);
            padding: 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            gap: 15px;
        }

        .logo-container {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            overflow: hidden;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-color);
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .header-info h1 {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .header-info p {
            font-size: 0.85rem;
            color: #a0aec0;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #a855f7;
            border-radius: 50%;
            display: inline-block;
        }

        .clear-btn {
            background: none;
            border: none;
            color: #ef4444;
            font-size: 1.2rem;
            cursor: pointer;
            margin-left: auto;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
            margin-bottom: 65px;
        }

        #chat-container::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            background-image: url('logo.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0.04;
            pointer-events: none;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
            position: relative;
            z-index: 1;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bot-message {
            background-color: var(--bot-msg-bg);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border-color);
        }

        .user-message {
            background-color: var(--user-msg-bg);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .msg-meta {
            font-size: 0.75rem;
            font-weight: bold;
            margin-bottom: 5px;
            display: block;
        }

        .bot-meta { color: #a855f7; }
        .user-meta { color: #e2e8f0; }

        .chat-image {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            margin-top: 8px;
            display: block;
        }

        .error-message {
            background-color: #2d191e;
            border: 1px solid #f56565;
            color: #fc8181;
        }

        .footer-controls {
            position: fixed;
            bottom: 60px;
            left: 0;
            width: 100%;
            background-color: var(--chat-bg);
            z-index: 90;
        }

        .input-container {
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 1px solid var(--border-color);
            align-items: center;
        }

        #input-field {
            flex: 1;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
        }

        #input-field:focus {
            border-color: var(--primary-color);
        }

        .icon-btn {
            background-color: var(--bot-msg-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            width: 45px;
            height: 45px;
            border-radius: 8px;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #send-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0 20px;
            height: 45px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        #image-preview-container {
            display: none;
            background-color: var(--bot-msg-bg);
            padding: 10px 15px;
            border-top: 1px solid var(--border-color);
            align-items: center;
            gap: 10px;
        }

        .preview-box {
            position: relative;
            width: 60px;
            height: 60px;
        }

        .preview-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .remove-preview {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
        }

        nav.nav-tabs {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background-color: var(--chat-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #a0aec0;
            text-decoration: none;
            font-size: 0.75rem;
            flex: 1;
            height: 100%;
            justify-content: center;
            gap: 4px;
        }

        .nav-item.active {
            color: #a855f7;
            font-weight: bold;
        }

        .nav-icon {
            font-size: 1.3rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="logo.png" alt="Relectrónica Logo">
        </div>
        <div class="header-info">
            <h1>Relectrónica</h1>
            <p><span class="status-dot"></span> Línea Técnica Personalizada</p>
        </div>
        <button class="clear-btn" id="clear-btn" title="Borrar Historial">🗑️</button>
    </header>

    <div id="chat-container"></div>

    <div class="footer-controls">
        <div id="image-preview-container">
            <div class="preview-box">
                <img id="image-preview" src="" alt="Preview">
                <button class="remove-preview" id="cancel-image-btn">×</button>
            </div>
            <span style="font-size: 0.85rem; color: #a0aec0;">Imagen lista para analizar</span>
        </div>

        <div class="input-container">
            <input type="file" id="file-input" accept="image/*" style="display: none;">
            <button class="icon-btn" id="attach-btn" title="Adjuntar imagen">📎</button>
            <input type="text" id="input-field" placeholder="Escribe la falla o adjunta una foto..." autocomplete="off">
            <button id="send-btn">Enviar</button>
        </div>
    </div>

        <nav class="nav-tabs">
        <a href="index.html" class="nav-item active">
            <span class="nav-icon">💬</span>
            <span>Chat Técnico</span>
        </a>
        <a href="biblioteca.html" class="nav-item">
            <span class="nav-icon">📘</span>
            <span>Biblioteca</span>
        </a>
        <a href="hardware.html" class="nav-item">
            <span class="nav-icon">🖼️</span>
            <span>Hardware</span>
        </a>
        <a href="fallas.html" class="nav-item">
            <span class="nav-icon">🛠️</span>
            <span>Casos de Falla</span>
        </a>
            </a>
        <a href="calculadoras.html" class="nav-item active">
            <span class="nav-icon">🧮</span>
            <span>Cálculos</span>
        </a>
    </nav>

    <script>
        const COHERE_API_KEY = "594SHpSQqQo0yWaa48hHgwDbRCijYSVD2biJOLLL"; 
        
        const chatContainer = document.getElementById('chat-container');
        const inputField = document.getElementById('input-field');
        const sendBtn = document.getElementById('send-btn');
        const fileInput = document.getElementById('file-input');
        const attachBtn = document.getElementById('attach-btn');
        const imagePreviewContainer = document.getElementById('image-preview-container');
        const imagePreview = document.getElementById('image-preview');
        const cancelImageBtn = document.getElementById('cancel-image-btn');
        const clearBtn = document.getElementById('clear-btn');

        let selectedImageBase64 = null;
        let chatHistory = [];

        window.addEventListener('DOMContentLoaded', () => {
            const savedChat = localStorage.getItem('relectronica_chat_history');
            if (savedChat) {
                chatHistory = JSON.parse(savedChat);
                chatHistory.forEach(msg => {
                    appendMessageToDOM(msg.sender, msg.text, msg.isError, msg.imageSrc);
                });
            } else {
                const welcomeText = '¡Excelente Jefferson! Tu logo oficial ha sido integrado como marca de agua en el fondo del chat y en el encabezado. Chatea normalmente y verás cómo los mensajes flotan por encima sin ocultarlo.';
                appendMessageToDOM('bot', welcomeText);
                saveMessageToHistory('bot', welcomeText);
            }
        });

        attachBtn.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                selectedImageBase64 = event.target.result.split(',')[1];
                imagePreview.src = event.target.result;
                imagePreviewContainer.style.display = 'flex';
            };
            reader.readAsDataURL(file);
        });

        cancelImageBtn.addEventListener('click', () => {
            selectedImageBase64 = null;
            fileInput.value = '';
            imagePreviewContainer.style.display = 'none';
        });

        clearBtn.addEventListener('click', () => {
            if (confirm('¿Quieres vaciar toda la conversación actual?')) {
                localStorage.removeItem('relectronica_chat_history');
                chatHistory = [];
                chatContainer.innerHTML = '';
                const welcomeText = '¡Excelente Jefferson! Tu logo oficial ha sido integrado como marca de agua en el fondo del chat y en el encabezado. Chatea normalmente y verás cómo los mensajes flotan por encima sin ocultarlo.';
                appendMessageToDOM('bot', welcomeText);
                saveMessageToHistory('bot', welcomeText);
            }
        });

        function appendMessageToDOM(sender, text, isError = false, imageSrc = null) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.classList.add(sender === 'bot' ? 'bot-message' : 'user-message');
            if (isError) msgDiv.classList.add('error-message');

            const metaSpan = document.createElement('span');
            metaSpan.classList.add('msg-meta');
            metaSpan.classList.add(sender === 'bot' ? 'bot-meta' : 'user-meta');
            metaSpan.innerText = sender === 'bot' ? '⚡ Relectrónica Bot:' : 'Jefferson:';

            msgDiv.appendChild(metaSpan);
            
            if (text) {
                const formattedText = text.split('\n');
                formattedText.forEach((line, index) => {
                    msgDiv.appendChild(document.createTextNode(line));
                    if (index < formattedText.length - 1) {
                        msgDiv.appendChild(document.createElement('br'));
                    }
                });
            }

            if (imageSrc) {
                const img = document.createElement('img');
                img.src = imageSrc;
                img.classList.add('chat-image');
                msgDiv.appendChild(img);
            }

            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function saveMessageToHistory(sender, text, isError = false, imageSrc = null) {
            chatHistory.push({ sender, text, isError, imageSrc });
            localStorage.setItem('relectronica_chat_history', JSON.stringify(chatHistory));
        }

        async function sendMessage() {
            const query = inputField.value.trim();
            if (!query && !selectedImageBase64) return;

            const currentImageSrc = imagePreview.src;
            const activeImageBase64 = selectedImageBase64;
            
            appendMessageToDOM('user', query, false, activeImageBase64 ? currentImageSrc : null);
            saveMessageToHistory('user', query, false, activeImageBase64 ? currentImageSrc : null);
            
            inputField.value = '';
            selectedImageBase64 = null;
            fileInput.value = '';
            imagePreviewContainer.style.display = 'none';

            inputField.disabled = true;
            sendBtn.disabled = true;
            attachBtn.disabled = true;

            try {
                const response = await fetch('https://api.cohere.ai/v1/chat', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${COHERE_API_KEY}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'command-r-08-2024',
                        message: query || "Por favor analiza la imagen que te adjunto para esta consulta técnica.",
                        preamble: "Eres un asistente técnico experto en electrónica, hardware, diagnóstico de tarjetas PCB y reparación de pantallas LED. Responde de forma precisa y profesional a Jefferson."
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    appendMessageToDOM('bot', data.text);
                    saveMessageToHistory('bot', data.text);
                } else {
                    appendMessageToDOM('bot', `⚠️ Error de validación: ${data.message || 'Error desconocido.'}`, true);
                }

            } catch (error) {
                appendMessageToDOM('bot', '⚠️ Error de red: No se pudo conectar con el servidor.', true);
                console.error(error);
            } finally {
                inputField.disabled = false;
                sendBtn.disabled = false;
                attachBtn.disabled = false;
                inputField.focus();
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        inputField.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
