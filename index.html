    <style>
        :root {
            --bg-color: #0b131f;
            --chat-bg: #111c2c;
            --text-color: #ffffff;
            --primary-color: #7928ca;
            --bot-msg-bg: #1a273a;
            --user-msg-bg: #7928ca;
            --border-color: #22344d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: var(--chat-bg);
            padding: 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            gap: 15px;
        }

        .logo-container {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            overflow: hidden;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-color);
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .header-info h1 {
            font-size: 1.2rem;
            font-weight: 600;
        }
        .header-info p {
    font-size: 0.85rem;
    color: #a0aec0;
    display: flex;
    align-items: center;
    gap: 5px;
}

.status-dot {
    width: 8px;
    height: 8px;
    background-color: #a855f7;
    border-radius: 50%;
    display: inline-block;
}

.header-actions {
    display: flex;
    gap: 8px;
    margin-left: auto;
}

.sync-btn {
    background: none;
    border: none;
    color: #10b981;
    font-size: 1.2rem;
    cursor: pointer;
    padding: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.clear-btn {
    background: none;
    border: none;
    color: #ef4444;
    font-size: 1.2rem;
    cursor: pointer;
    padding: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
}

#chat-container {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 15px;
    position: relative;
    margin-bottom: 65px;
}

#chat-container::before {
    content: "";
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 300px;
    height: 300px;
    background-image: url('logo.png');
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    opacity: 0.04;
    pointer-events: none;
}

.message {
    max-width: 85%;
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 0.95rem;
    line-height: 1.4;
    word-wrap: break-word;
    animation: fadeIn 0.3s ease;
    position: relative;
    z-index: 1;
}
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
}

.bot-message {
    background-color: var(--bot-msg-bg);
    align-self: flex-start;
    border-bottom-left-radius: 4px;
    border: 1px solid var(--border-color);
}

.user-message {
    background-color: var(--user-msg-bg);
    align-self: flex-end;
    border-bottom-right-radius: 4px;
}

.msg-meta {
    font-size: 0.75rem;
    font-weight: bold;
    margin-bottom: 5px;
    display: block;
}

.bot-meta { color: #a855f7; }
.user-meta { color: #e2e8f0; }

.chat-image {
    max-width: 100%;
    max-height: 200px;
    border-radius: 8px;
    margin-top: 8px;
    display: block;
}

.error-message {
    background-color: #2d191e;
    border: 1px solid #f56565;
    color: #fc8181;
}

.footer-controls {
    position: fixed;
    bottom: 60px;
    left: 0;
    width: 100%;
    background-color: var(--chat-bg);
    z-index: 90;
}

.input-container {
    padding: 15px;
    display: flex;
    gap: 10px;
    border-top: 1px solid var(--border-color);
    align-items: center;
}

#input-field {
    flex: 1;
    background-color: var(--bg-color);
    border: 1px solid var(--border-color);
    color: var(--text-color);
    padding: 12px;
    border-radius: 8px;
    font-size: 0.95rem;
    outline: none;
}

#input-field:focus {
    border-color: var(--primary-color);
}
.icon-btn {
    background-color: var(--bot-msg-bg);
    border: 1px solid var(--border-color);
    color: var(--text-color);
    width: 45px;
    height: 45px;
    border-radius: 8px;
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
}

.mic-escuchando {
    background-color: #ef4444 !important;
    border-color: #ef4444 !important;
    box-shadow: 0 0 12px #ef4444;
    animation: pulsoMic 1.5s infinite;
}

@keyframes pulsoMic {
    0% { transform: scale(1); }
    50% { transform: scale(1.06); }
    100% { transform: scale(1); }
}

#send-btn {
    background-color: var(--primary-color);
    color: white;
    border: none;
    padding: 0 20px;
    height: 45px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
}

#image-preview-container {
    display: none;
    background-color: var(--bot-msg-bg);
    padding: 10px 15px;
    border-top: 1px solid var(--border-color);
    align-items: center;
    gap: 10px;
}

.preview-box {
    position: relative;
    width: 60px;
    height: 60px;
}

.preview-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 6px;
    border: 1px solid var(--border-color);
}

.remove-preview {
    position: absolute;
    top: -5px;
    right: -5px;
    background: #ef4444;
    color: white;
    border-radius: 50%;
    width: 18px;
    height: 18px;
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: none;
}
        nav.nav-tabs {

</head>

<script>
    const COHERE_API_KEY = "594SHpSQqQo0yWaa48hHgwDbRCijYSVD2biJOLLL"; 
    
    const chatContainer = document.getElementById('chat-container');
    const inputField = document.getElementById('input-field');
    const sendBtn = document.getElementById('send-btn');
    const fileInput = document.getElementById('file-input');
    const attachBtn = document.getElementById('attach-btn');
    const imagePreviewContainer = document.getElementById('image-preview-container');
    const imagePreview = document.getElementById('image-preview');
    const cancelImageBtn = document.getElementById('cancel-image-btn');
    const clearBtn = document.getElementById('clear-btn');
    const syncBtn = document.getElementById('sync-btn');
    const micBtn = document.getElementById('mic-btn');

    let selectedImageBase64 = null;
    let chatHistory = [];
    let reconocimientoVoz = null;
    let estaEscuchando = false;
    
    // Variables para la base de conocimiento local
    let dictionaryEntries = [];
    let fallasPredefinidas = [];
    // ==========================================================
// BIBLIOTECA DE RESPALDO (por si falla la carga)
// ==========================================================

function getBibliotecaRespaldo() {
    return [
        { id: 1, term: "VGH", category: "voltajes", description: "Voltaje positivo alto (+20V a +30V) que enciende los TFT del panel LCD.", tip: "Medir en T-CON cerca del DC-DC. Si falta: pantalla blanca.", extra: "Síntoma típico: imagen fantasmal o rayas verticales." },
        { id: 2, term: "VGL", category: "voltajes", description: "Voltaje negativo (-5V a -10V) que apaga los TFT para refrescar.", tip: "VGL inestable produce parpadeos en la imagen.", extra: "Debe estar cerca de -8V en paneles funcionales." },
        { id: 3, term: "VCOM", category: "voltajes", description: "Voltaje de referencia para cristales líquidos (~6-8V).", tip: "Desbalanceado causa flicker vertical o imagen con sombras." },
        { id: 4, term: "MOSFET", category: "semiconductores", description: "Transistor de efecto de campo usado como interruptor.", tip: "Falla común: drenaje-fuente en corto. Medir con multímetro en modo diodo." }
    ];
}

// ==========================================================
// CARGA DINÁMICA DE BIBLIOTECA (desde biblioteca.html)
// ==========================================================

async function cargarBiblioteca() {
    try {
        // Intentar cargar desde localStorage primero
        const bibliotecaCache = localStorage.getItem('relectronica_biblioteca_cache');
        if (bibliotecaCache && bibliotecaCache !== '[]') {
            dictionaryEntries = JSON.parse(bibliotecaCache);
            console.log(`📚 Biblioteca cargada desde caché: ${dictionaryEntries.length} términos`);
            return true;
        }
        
        console.log("Cargando biblioteca desde archivo...");
        const response = await fetch('biblioteca.html');
        
        if (!response.ok) {
            console.warn("No se pudo cargar biblioteca.html, usando respaldo");
            dictionaryEntries = getBibliotecaRespaldo();
            localStorage.setItem('relectronica_biblioteca_cache', JSON.stringify(dictionaryEntries));
            return false;
        }
        
        const html = await response.text();
        
        // Buscar el array dictionaryEntries de diferentes maneras
        let encontrado = false;
        
        // Intento 1: Buscar const dictionaryEntries = [...]
        let regex = /const dictionaryEntries = (\[[\s\S]*?\](?=;|const|let|var|$))/;
        let match = html.match(regex);
        
        if (!match) {
            // Intento 2: Buscar let dictionaryEntries = [...]
            regex = /let dictionaryEntries = (\[[\s\S]*?\](?=;|const|let|var|$))/;
            match = html.match(regex);
        }
        
        if (!match) {
            // Intento 3: Buscar dictionaryEntries = [...]
            regex = /dictionaryEntries = (\[[\s\S]*?\](?=;|const|let|var|$))/;
            match = html.match(regex);
        }
        
        if (match && match[1]) {
            try {
                const evalFunc = new Function('return ' + match[1]);
                const tempEntries = evalFunc();
                if (tempEntries && tempEntries.length > 0) {
                    dictionaryEntries = tempEntries;
                    encontrado = true;
                }
            } catch(e) {
                console.error("Error parsing dictionary:", e);
            }
        }
        
        if (!encontrado || dictionaryEntries.length === 0) {
            console.warn("No se encontró dictionaryEntries, usando respaldo");
            dictionaryEntries = getBibliotecaRespaldo();
        }
        
        localStorage.setItem('relectronica_biblioteca_cache', JSON.stringify(dictionaryEntries));
        console.log(`📚 Biblioteca final: ${dictionaryEntries.length} términos`);
        return true;
        
    } catch (error) {
        console.error('Error cargando biblioteca:', error);
        dictionaryEntries = getBibliotecaRespaldo();
        return false;
    }
}
// ==========================================================
// FUNCIONES PRINCIPALES DEL CHAT
// ==========================================================

window.addEventListener('DOMContentLoaded', async () => {
    // Mostrar mensaje de carga
    appendMessageToDOM('bot', '🔧 **Inicializando Relectrónica Bot...**\n\nCargando base de conocimiento local...');
    
    // Cargar biblioteca y casos de falla
    await Promise.all([cargarBiblioteca(), cargarCasosDeFalla()]);
    
    // Mostrar estado de carga
    let estadoMsg = `✅ **Base local cargada:**\n• 📘 ${dictionaryEntries.length} términos técnicos\n• 🛠️ ${fallasPredefinidas.length} casos de falla\n• 📝 Tus notas personales (automático)\n\n`;
    
    if (dictionaryEntries.length === 0) {
        estadoMsg = `⚠️ **Biblioteca no encontrada**\nUsando base de datos de respaldo.\n\n`;
    }
    
    // Cargar historial guardado
    const savedChat = localStorage.getItem('relectronica_chat_history');
    if (savedChat) {
        chatHistory = JSON.parse(savedChat);
        chatContainer.innerHTML = '';
        chatHistory.forEach(msg => {
            appendMessageToDOM(msg.sender, msg.text, msg.isError, msg.imageSrc);
        });
    } else {
        estadoMsg += `💡 **Puedes preguntarme sobre:**\n• VGH, VGL, VCOM, MOSFET\n• Fallas de Samsung/LG\n• Soluciones que hayas guardado en Notas\n\n**¡Los nuevos casos que agregues se detectan solos!**`;
        appendMessageToDOM('bot', estadoMsg);
        saveMessageToHistory('bot', estadoMsg);
    }
    
    inicializarReconocimientoVoz();
});
        async function sendMessage() {
            const query = inputField.value.trim();
            if (!query && !selectedImageBase64) return;
            
            const currentImageSrc = imagePreview.src;
            const activeImageBase64 = selectedImageBase64;
            
            appendMessageToDOM('user', query, false, activeImageBase64 ? currentImageSrc : null);
            saveMessageToHistory('user', query, false, activeImageBase64 ? currentImageSrc : null);
            
            inputField.value = '';
            selectedImageBase64 = null;
            fileInput.value = '';
            imagePreviewContainer.style.display = 'none';
            
            inputField.disabled = true;
            sendBtn.disabled = true;
            attachBtn.disabled = true;
            
            try {
                // Buscar en base local
                const resultadosLocales = buscarEnBaseLocal(query);
                const contextoLocal = resultadosLocales.length > 0 ? construirContextoLocal(query) : null;
                
                let respuestaFinal = "";
                
                if (contextoLocal) {
                    // Si hay resultados locales, úsalos como respuesta principal
                    respuestaFinal = "🔍 **Encontré esto en tu base técnica local:**\n\n";
                    
                    for (let i = 0; i < Math.min(resultadosLocales.length, 3); i++) {
                        const r = resultadosLocales[i];
                        respuestaFinal += `**${r.fuente}**\n📌 *${r.titulo}*\n${r.contenido}\n\n---\n\n`;
                    }
                    
                    respuestaFinal += "✅ **Respuesta basada en tu conocimiento local.**\n";
                    
                    // Preguntar si quiere más información de internet
                    respuestaFinal += "\n💡 *¿Necesitas más información? Puedes preguntar 'más info' o 'internet' para buscar online.*";
                    
                    appendMessageToDOM('bot', respuestaFinal);
                    saveMessageToHistory('bot', respuestaFinal);
                    hablarTexto(respuestaFinal.replace(/\*|_/g, ''));
                    
                } else {
                    // NO hay resultados locales → consultar a Cohere SÍ o SÍ
                    appendMessageToDOM('bot', "🔍 **Buscando en internet...**\n\nNo encontré información en tu base local. Consultando a la base de conocimiento online...");
                    
                    const response = await fetch('https://api.cohere.ai/v1/chat', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${COHERE_API_KEY}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            model: 'command-r-08-2024',
                            message: query,
                            preamble: "Eres un asistente técnico experto en electrónica, reparación de TVs, y componentes electrónicos. Responde de forma clara, profesional y práctica."
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok && data.text) {
                        respuestaFinal = data.text;
                        appendMessageToDOM('bot', respuestaFinal);
                        saveMessageToHistory('bot', respuestaFinal);
                        hablarTexto(respuestaFinal.replace(/\*|_/g, ''));
                    } else {
                        appendMessageToDOM('bot', '⚠️ No pude obtener una respuesta. Por favor, intenta de nuevo más tarde.', true);
                    }
                }
                
            } catch (error) {
                console.error(error);
                appendMessageToDOM('bot', '⚠️ Error de conexión. Verifica tu internet e intenta de nuevo.', true);
            } finally {
                inputField.disabled = false;
                sendBtn.disabled = false;
                attachBtn.disabled = false;
                inputField.focus();
            }
        }
        
        // Event Listeners
        sendBtn.addEventListener('click', sendMessage);
        inputField.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
        attachBtn.addEventListener('click', () => fileInput.click());
        syncBtn.addEventListener('click', () => sincronizarBaseLocal());
        
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                selectedImageBase64 = event.target.result.split(',')[1];
                imagePreview.src = event.target.result;
                imagePreviewContainer.style.display = 'flex';
            };
            reader.readAsDataURL(file);
        });
        
        cancelImageBtn.addEventListener('click', () => {
            selectedImageBase64 = null;
            fileInput.value = '';
            imagePreviewContainer.style.display = 'none';
        });
        
        clearBtn.addEventListener('click', () => {
            if (confirm('¿Borrar toda la conversación?')) {
                if ('speechSynthesis' in window) window.speechSynthesis.cancel();
                localStorage.removeItem('relectronica_chat_history');
                chatHistory = [];
                chatContainer.innerHTML = '';
                appendMessageToDOM('bot', 'Historial borrado. ¡Estoy listo para ayudarte!');
                saveMessageToHistory('bot', 'Historial borrado. ¡Estoy listo para ayudarte!');
            }
        });
        
        // Reconocimiento de voz
        function inicializarReconocimientoVoz() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return;
            reconocimientoVoz = new SpeechRecognition();
            reconocimientoVoz.lang = 'es-VE';
            reconocimientoVoz.continuous = false;
            reconocimientoVoz.interimResults = false;
            reconocimientoVoz.onstart = () => {
                estaEscuchando = true;
                micBtn.classList.add('mic-escuchando');
                micBtn.innerHTML = "🛑";
                inputField.placeholder = "Escuchando...";
            };
            reconocimientoVoz.onerror = () => forzarApagadoMic();
            reconocimientoVoz.onend = () => forzarApagadoMic();
            reconocimientoVoz.onresult = (event) => {
                const texto = event.results[0][0].transcript;
                if (texto.trim()) {
                    inputField.value = texto;
                    sendMessage();
                }
            };
        }
        
        function forzarApagadoMic() {
            estaEscuchando = false;
            micBtn.classList.remove('mic-escuchando');
            micBtn.innerHTML = "🎙️";
            inputField.placeholder = "Escribe la falla o habla con manos libres...";
        }
        
        function hablarTexto(texto) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(texto);
                utterance.lang = 'es-ES';
                utterance.rate = 1.0;
                window.speechSynthesis.speak(utterance);
            }
        }
        
        window.alternarMicrofono = function() {
            if (!reconocimientoVoz) {
                alert("Voz no soportada");
                return;
            }
            if (estaEscuchando) reconocimientoVoz.stop();
            else {
                if ('speechSynthesis' in window) window.speechSynthesis.cancel();
                reconocimientoVoz.start();
            }
        };
    </script>
